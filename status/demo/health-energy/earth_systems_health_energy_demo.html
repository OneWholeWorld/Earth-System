<style>
html,body{margin:0;overflow:hidden;background:black}
canvas{display:block}
#hud{

  padding:10px 12px;border-radius:12px;
  background:rgba(8,12,24,.55);backdrop-filter:blur(10px);

#showConnectionsBtn, #showHealthBtn{

  border-radius:10px;
  padding:9px 10px;
  cursor:pointer;
  color:white;

#showConnectionsBtn:hover, #showHealthBtn:hover {

#showConnectionsBtn.active{

}
#showHealthBtn.active{

}



#inspectPanel{

  top:16px;

}
#inspectPanel.visible{display:block}

}
#inspectPanel p{
  margin:0 0 12px 0;

  font-size:12px;
}
#closeInspectBtn{

  top:10px;
  right:10px;
  width:28px;
  height:28px;
  border:none;
  border-radius:999px;

  font:600 16px/1 Inter,system-ui,sans-serif;
}

.inspectBtns{display:flex;flex-direction:column;gap:8px}
.inspectBtns button{

#satisfiedBtn{background:#16a34a}

/* Health filter panel mode */
body.health-panel-mode #satisfiedBtn,
body.health-panel-mode #notSatisfiedBtn,
body.health-panel-mode #focusEnergyBtn,

#healthPositiveBtn,

}
#healthPositiveBtn{

#healthNegativeBtn.active{

/* Pillar height percentile range control */

#pillarHeightRangeControl{

#pillarHeightRangeTitle{

}

#pillarHeightRangeReadout{

}

#pillarHeightRangeCount{

#pillarHeightSliderWrap{

#ui-container{position:fixed;bottom:24px;left:24px;z-index:60;transition:opacity .5s ease}.dropdown{position:relative;display:inline-block}#target-btn{background:rgba(8,12,24,.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:12px 20px;color:#eef4ff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.4);transition:all .2s ease;display:flex;align-items:center;gap:8px;min-width:120px;justify-content:space-between}#target-btn:hover{background:rgba(255,255,255,.1)}.dropdown-content{display:none;position:absolute;bottom:100%;left:0;margin-bottom:12px;background:rgba(8,12,24,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.15);border-radius:12px;min-width:140px;box-shadow:0 8px 32px rgba(0,0,0,.6);overflow:hidden;flex-direction:column}.dropdown-content.show{display:flex}.dropdown-item{padding:14px 20px;color:#eef4ff;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s ease;display:flex;align-items:center;gap:10px}.dropdown-item:hover{background:rgba(255,255,255,.1)}.dropdown-item.active{color:#ffd700;background:rgba(255,215,0,.15)}.gray-moon{filter:grayscale(100%) brightness(1.2);display:inline-block}body.micro-view #ui-container{opacity:0;pointer-events:none}

position:fixed;
pointer-events:auto;
background:rgba(8,12,24,.92);
border:1px solid rgba(255,255,255,.15);
border-radius:16px;
padding:14px 16px;

  <div id="flySuggestions" style="display:none; max-height:220px; overflow:auto; margin-top:7px; background:rgba(8,12,24,.90); border:1px solid rgba(255,255,255,.12); border-radius:14px; backdrop-filter:blur(14px); box-shadow:0 18px 44px rgba(0,0,0,.42);"></div>
</div>

<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.0015, 1000);

// ===== CAMERA ORBIT =====
const orbit = {
  radius: 3.1,
  theta: 0,
  phi: 0.22
};

// Close-up exploration.
// Lower minimum radius lets raw city columns separate visually when zooming in.
const ORBIT_MIN_RADIUS = 1.025;
const ORBIT_MAX_RADIUS = 5.0;
const ORBIT_ZOOM_SPEED = 0.0015;

// Close zoom city-footprint mode.
// At very close zoom, tall columns flatten into short selectable discs.
const DISC_MODE_START_RADIUS = 1.42;
const DISC_MODE_FULL_RADIUS = 1.035;
const DISC_HEIGHT_FACTOR = 0.018;
// At close zoom, shrink diameter as height flattens so raw cities separate visually.
const DISC_RADIUS_FACTOR = 0.24;

// ===== TAKE257 TARGET CAMERA SYSTEM (REFERENCE PARITY) =====
const TARGET_CONFIGS = {
  earth: { minRadius: 1.35, maxRadius: 20.0, defaultRadius: 3.1, discStart: DISC_MODE_START_RADIUS, earthScale: 1.0 },
  moon:  { minRadius: 0.08, maxRadius: 20.0, defaultRadius: 0.35, discStart: 0.12, earthScale: 0.25 },
  sun:   { minRadius: 0.15, maxRadius: 35.0, defaultRadius: 4.5, discStart: 0.3, earthScale: 1.0 }
};
let currentTargetName = 'earth';
let currentConfig = TARGET_CONFIGS.earth;
let dynamicCenter = new THREE.Vector3(0, 0, 0);
const flight = { active:false, startTime:0, duration:2500, startRadius:0, endRadius:0, startCenter:new THREE.Vector3(), endCenterName:'earth', startEarthScale:1.0, startTheta:0, endTheta:0, startPhi:0, endPhi:0 };

function updateCamera() {
  const r = orbit.radius;
  const cp = Math.cos(orbit.phi);
  camera.position.set(
    dynamicCenter.x + Math.sin(orbit.theta) * cp * r,
    dynamicCenter.y + Math.sin(orbit.phi) * r,
    dynamicCenter.z + Math.cos(orbit.theta) * cp * r
  );
  camera.lookAt(dynamicCenter);
}

updateCamera();

// ===== TAKE254 HYBRID ENGINE: MICRO 2D MAPLIBRE SETUP =====
let isMicroView = false;
let streetMap = null;
const MACRO_MIN_RADIUS = 1.35;
const MICRO_START_ZOOM = 4.5;
const MICRO_EXIT_ZOOM = 4.3;

function initOrUpdateMap(lat, lng) {
  if (typeof maplibregl === 'undefined') {
    console.warn('MapLibre not loaded; cannot enter 2D map view.');
    return;
  }

  if (!streetMap) {
    streetMap = new maplibregl.Map({
      container: 'map-container',
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '&copy; OpenStreetMap Contributors'
          }
        },
        layers: [{
          id: 'osm-tiles',
          type: 'raster',
          source: 'osm',
          minzoom: 0,
          maxzoom: 19
        }]
      },
      center: [lng, lat],
      zoom: MICRO_START_ZOOM,
      pitch: 0,
      interactive: true
    });

    streetMap.on('zoom', () => {
      if (isMicroView && streetMap.getZoom() < MICRO_EXIT_ZOOM) {
        switchToMacro();
      }
    });

    streetMap.on('load', () => {
      console.log('✅ MapLibre 2D map loaded.');
      upsert2DHealthLayer();
    });
  } else {
    streetMap.jumpTo({ center: [lng, lat], zoom: MICRO_START_ZOOM });
    streetMap.resize();
  }
}

function setHealthOverlayForView() {
  const in3D = !isMicroView;
  if (typeof healthPillarsGroup !== 'undefined' && healthPillarsGroup) {
    healthPillarsGroup.visible = healthMode && in3D;
  }
  updateFlyPanelState();
}


// ===== TAKE272: 2D HEALTH DONUT DISKS =====
// Uses the same loaded Health dataset and clusteredGreenShare() logic as the 3D columns.
// 3D/2D switching foundation is unchanged.
function get2DHealthDisplayData() {
  if (!fullPopulationDataset || !fullPopulationDataset.length) return [];

  const filtered = filteredPopulationByHeightPercentile();
  return clusterHealthCities(filtered);
}

function build2DHealthGeoJSON(data) {
  const maxPop = fullPopulationMaxPop || Math.max(...data.map(d => d.pop || 0), 1);
  const totalPop = data.reduce((sum, d) => sum + (Number.isFinite(d.pop) ? d.pop : 0), 0) || 1;

  // Match the 3D normalization logic: raw regional shares are scaled so weighted avg ~20% green.
  const rawShares = data.map(d => clusteredGreenShare(d.lat, d.lng));
  const rawWeightedAvg = rawShares.reduce((sum, share, idx) => {
    const pop = Number.isFinite(data[idx].pop) ? data[idx].pop : 0;
    return sum + share * pop;
  }, 0) / totalPop;
  const shareScale = rawWeightedAvg > 0 ? 0.20 / rawWeightedAvg : 1.0;

  return {
    type: 'FeatureCollection',
    features: data
      .filter(d => Number.isFinite(d.lat) && Number.isFinite(d.lng))
      .map((d, idx) => {
        const popNorm = Math.sqrt((Number.isFinite(d.pop) ? d.pop : 0) / maxPop);
        const greenShare = clamp01(rawShares[idx] * shareScale);
        const redShare = 1 - greenShare;

        return {
          type: 'Feature',
          geometry: {
            type: 'Point',
            coordinates: [d.lng, d.lat]
          },
          properties: {
            id: d.id || `${d.lat}_${d.lng}`,
            pillarId: d.id || `${d.lat}_${d.lng}`,
            name: d.placeLabel || d.city || d.cityAscii || d.adminName || approxCityName(d.lat, d.lng),
            placeLabel: d.placeLabel || d.city || d.cityAscii || d.adminName || approxCityName(d.lat, d.lng),
            city: d.city || d.cityAscii || d.placeLabel || null,
            cityAscii: d.cityAscii || null,
            adminName: d.adminName || null,
            lat: d.lat,
            lng: d.lng,
            pop: Number.isFinite(d.pop) ? d.pop : 0,
            popNorm,
            greenShare,
            redShare,
            isCluster: !!d.isCluster,
            clusterCount: d.clusterCount || 1
          }
        };
      })
  };
}


let hovered2DHealthId = null;
let selected2DHealthMeta = null;
let health2DInteractionsReady = false;

function featureToHealthMeta(feature) {
  const p = feature && feature.properties ? feature.properties : {};
  return {
    id: p.id || p.pillarId || null,
    pillarId: p.pillarId || p.id || null,
    source: 'maplibre-health2d',
    city: p.city || p.name || null,
    cityAscii: p.cityAscii || null,
    adminName: p.adminName || null,
    placeLabel: p.placeLabel || p.name || p.city || null,
    isCluster: !!p.isCluster,
    clusterCount: Number(p.clusterCount) || 1,
    lat: Number(p.lat),
    lng: Number(p.lng),
    pop: Number(p.pop) || 0,
    greenShare: Number(p.greenShare) || 0,
    redShare: Number(p.redShare) || Math.max(0, 1 - (Number(p.greenShare) || 0))
  };
}

function set2DSelectedHealthDisk(meta) {
  selected2DHealthMeta = meta || null;

  if (!streetMap || !streetMap.getSource('health2d-selected')) return;

  const data = meta && Number.isFinite(meta.lat) && Number.isFinite(meta.lng)
    ? {
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [meta.lng, meta.lat] },
          properties: {
            popNorm: Math.sqrt((Number(meta.pop) || 0) / Math.max(fullPopulationMaxPop || 1, 1))
          }
        }]
      }
    : { type: 'FeatureCollection', features: [] };

  streetMap.getSource('health2d-selected').setData(data);
}

function ensure2DSelectedHealthLayer() {
  if (!streetMap) return;

  if (!streetMap.getSource('health2d-selected')) {
    streetMap.addSource('health2d-selected', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] }
    });
  }

  if (!streetMap.getLayer('health2d-selected-halo')) {
    streetMap.addLayer({
      id: 'health2d-selected-halo',
      type: 'circle',
      source: 'health2d-selected',
      paint: {
        'circle-radius': [
          'interpolate', ['linear'], ['zoom'],
          3, ['+', 5, ['*', 10, ['get', 'popNorm']]],
          6, ['+', 7, ['*', 15, ['get', 'popNorm']]],
          10, ['+', 10, ['*', 25, ['get', 'popNorm']]],
          14, ['+', 14, ['*', 39, ['get', 'popNorm']]]
        ],
        'circle-color': 'rgba(0,0,0,0)',
        'circle-stroke-color': '#ffffff',

function setup2DHealthInteractions() {
  if (!streetMap || health2DInteractionsReady) return;
  health2DInteractionsReady = true;

  const layers = ['health2d-green-inner', 'health2d-red-base'];

  streetMap.on('mousemove', 'health2d-red-base', (e) => {
    if (!healthMode || !isMicroView || !e.features || !e.features.length) return;
    const feature = e.features[0];
    const meta = featureToHealthMeta(feature);

    streetMap.getCanvas().style.cursor = 'pointer';
    showCityHoverFlag(meta, e.originalEvent.clientX, e.originalEvent.clientY);

    if (hovered2DHealthId !== null && streetMap.getSource('health2d')) {
      try { streetMap.setFeatureState({ source: 'health2d', id: hovered2DHealthId }, { hover: false }); } catch (_) {}
    }
    hovered2DHealthId = feature.id ?? null;
    if (hovered2DHealthId !== null) {
      try { streetMap.setFeatureState({ source: 'health2d', id: hovered2DHealthId }, { hover: true }); } catch (_) {}
    }
  });

  streetMap.on('mouseleave', 'health2d-red-base', () => {
    if (streetMap) streetMap.getCanvas().style.cursor = '';
    hideCityHoverFlag();
    if (hovered2DHealthId !== null && streetMap && streetMap.getSource('health2d')) {
      try { streetMap.setFeatureState({ source: 'health2d', id: hovered2DHealthId }, { hover: false }); } catch (_) {}
    }
    hovered2DHealthId = null;
  });

  streetMap.on('click', 'health2d-red-base', (e) => {
    if (!healthMode || !isMicroView || !e.features || !e.features.length) return;
    e.preventDefault();

    const meta = featureToHealthMeta(e.features[0]);
    lastSelectedCityForOrigin = meta;
    selectedPillar = meta.pillarId;

    hideCityHoverFlag();
    set2DSelectedHealthDisk(meta);
    showTooltip(meta, e.originalEvent.clientX, e.originalEvent.clientY);
  });

  // Green layer sits above red. Give it the same hover/click behavior.
  streetMap.on('mousemove', 'health2d-green-inner', (e) => {
    if (!healthMode || !isMicroView || !e.features || !e.features.length) return;
    const meta = featureToHealthMeta(e.features[0]);
    streetMap.getCanvas().style.cursor = 'pointer';
    showCityHoverFlag(meta, e.originalEvent.clientX, e.originalEvent.clientY);
  });

  streetMap.on('click', 'health2d-green-inner', (e) => {
    if (!healthMode || !isMicroView || !e.features || !e.features.length) return;
    e.preventDefault();

    const meta = featureToHealthMeta(e.features[0]);
    lastSelectedCityForOrigin = meta;
    selectedPillar = meta.pillarId;

    hideCityHoverFlag();
    set2DSelectedHealthDisk(meta);
    showTooltip(meta, e.originalEvent.clientX, e.originalEvent.clientY);
  });
}


function upsert2DHealthLayer() {
  if (!streetMap || !streetMap.isStyleLoaded || !streetMap.isStyleLoaded()) return;

  const data = get2DHealthDisplayData();
  const geojson = build2DHealthGeoJSON(data);

  if (streetMap.getSource('health2d')) {
    streetMap.getSource('health2d').setData(geojson);
  } else {
    streetMap.addSource('health2d', {
      type: 'geojson',
      data: geojson,
      generateId: true
    });
  }

  // Red base disk = whole city/cluster.
  if (!streetMap.getLayer('health2d-red-base')) {
    streetMap.addLayer({
      id: 'health2d-red-base',
      type: 'circle',
      source: 'health2d',
      paint: {
        'circle-radius': [
          'interpolate', ['linear'], ['zoom'],
          3, ['+', 2, ['*', 9, ['get', 'popNorm']]],
          6, ['+', 3, ['*', 14, ['get', 'popNorm']]],
          10, ['+', 5, ['*', 24, ['get', 'popNorm']]],
          14, ['+', 7, ['*', 38, ['get', 'popNorm']]]
        ],
        'circle-color': '#dc2626',
        'circle-opacity': [
          'case',
          ['boolean', ['feature-state', 'hover'], false],
          0.95,
          0.78
        ],
        'circle-stroke-width': 0.8,
        'circle-stroke-color': 'rgba(255,255,255,0.28)'
      }
    });
  }

  // Green inner disk = positive share. This reads like a donut/stacked health stamp:
  // red outside remains visible, green center scales by sqrt(share) so area roughly represents share.
  if (!streetMap.getLayer('health2d-green-inner')) {
    streetMap.addLayer({
      id: 'health2d-green-inner',
      type: 'circle',
      source: 'health2d',
      paint: {
        'circle-radius': [
  'interpolate', ['linear'], ['zoom'],
  3, ['*', ['+', 2, ['*', 9, ['get', 'popNorm']]], ['sqrt', ['max', 0.001, ['get', 'greenShare']]]],
  6, ['*', ['+', 3, ['*', 14, ['get', 'popNorm']]], ['sqrt', ['max', 0.001, ['get', 'greenShare']]]],
  10, ['*', ['+', 5, ['*', 24, ['get', 'popNorm']]], ['sqrt', ['max', 0.001, ['get', 'greenShare']]]],
  14, ['*', ['+', 7, ['*', 38, ['get', 'popNorm']]], ['sqrt', ['max', 0.001, ['get', 'greenShare']]]]
],
        'circle-color': '#16a34a',
        'circle-opacity': 0.86,
        'circle-stroke-width': 0
      }
    });
  }

  // Small center pin for readability at wide zoom.
  if (!streetMap.getLayer('health2d-center-pin')) {
    streetMap.addLayer({
      id: 'health2d-center-pin',
      type: 'circle',
      source: 'health2d',
      minzoom: 4.2,
      paint: {
        'circle-radius': [
          'interpolate', ['linear'], ['zoom'],
          4, 0.5,
          9, 1.4,
          14, 2.4
        ],
        'circle-color': '#f8fafc',
        'circle-opacity': 0.55
      }
    });
  }

  ensure2DSelectedHealthLayer();
  setup2DHealthInteractions();

  const visible = healthMode && isMicroView;
  set2DHealthLayerVisibility(visible);
}

function lerpAngle(current, target, amt) {
  let delta = target - current;
  while (delta > Math.PI) delta -= Math.PI * 2.0;
  while (delta < -Math.PI) delta += Math.PI * 2.0;
  return current + delta * amt;
}

  vertexShader: `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vPos;
    float hash(vec3 p) {
      p = fract(p * 0.3183099 + .1); p *= 17.0;
      return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
    }
    float noise(vec3 x) {
      vec3 i = floor(x); vec3 f = fract(x); f = f * f * (3.0 - 2.0 * f);
      return mix(mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
                 mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
    }
    float fbm(vec3 p) {
      float f = 0.0; float amp = 0.5;
      for(int i=0; i<4; i++){ f += amp * noise(p); p *= 2.0; amp *= 0.5; }
      return f;
    }
    void main() {
      vec3 nPos = normalize(vPos);
      float lat = asin(nPos.y); float lon = atan(nPos.z, nPos.x);
      float isCore = exp(-pow(lon, 2.0) * 0.5); 
      float thickness = 4.0 - 1.5 * isCore;
      float band = exp(-pow(abs(lat) * thickness, 2.0));
      float n = fbm(nPos * 15.0);
      float dust = fbm(nPos * 30.0 + vec3(10.0));
      float rift = smoothstep(0.3, 0.7, dust);

    }

  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide
});

let moon = null;
const moonDistance = 1.72;

function degToRad(deg) {
  return deg * Math.PI / 180;
}

function normalizeDeg(deg) {
  return ((deg % 360) + 360) % 360;
}

function getApproxMoonScenePosition(distance = moonDistance) {
  // Low-precision geocentric lunar model.
  // This is not ephemeris-grade, but it is much better than placing the Moon only by synodic age.
  // It keeps the Moon's visual position consistent with the current Sun-Moon elongation.
  const now = new Date();
  const d = (now.getTime() - Date.UTC(2000, 0, 1, 12, 0, 0)) / 86400000;

  // Approximate Sun ecliptic longitude.
  const sunMeanAnomaly = normalizeDeg(357.529 + 0.98560028 * d);
  const sunMeanLongitude = normalizeDeg(280.459 + 0.98564736 * d);
  const sunLongitude = normalizeDeg(
    sunMeanLongitude +
    1.915 * Math.sin(degToRad(sunMeanAnomaly)) +
    0.020 * Math.sin(degToRad(2 * sunMeanAnomaly))
  );

  // Approximate Moon ecliptic longitude/latitude.
  const L = normalizeDeg(218.316 + 13.176396 * d);       // mean longitude
  const Mm = normalizeDeg(134.963 + 13.064993 * d);      // Moon mean anomaly
  const D = normalizeDeg(297.850 + 12.190749 * d);       // mean elongation
  const F = normalizeDeg(93.272 + 13.229350 * d);        // argument of latitude

  const moonLongitude = normalizeDeg(
    L +
    6.289 * Math.sin(degToRad(Mm)) +
    1.274 * Math.sin(degToRad(2 * D - Mm)) +
    0.658 * Math.sin(degToRad(2 * D)) +
    0.214 * Math.sin(degToRad(2 * Mm)) -
    0.186 * Math.sin(degToRad(sunMeanAnomaly))
  );

  const moonLatitude =
    5.128 * Math.sin(degToRad(F)) +
    0.280 * Math.sin(degToRad(Mm + F)) +
    0.277 * Math.sin(degToRad(Mm - F)) +
    0.173 * Math.sin(degToRad(2 * D - F));

  const elongation = degToRad(normalizeDeg(moonLongitude - sunLongitude));
  const latRad = degToRad(moonLatitude);

  // In this scene the Sun is anchored along sun.position.
  // New Moon: Moon near Sun direction.
  // First Quarter: Moon roughly 90 degrees from Sun.
  // Full Moon: Moon opposite Sun.
  const sunDir = sun.position.clone().normalize();
  const up = new THREE.Vector3(0, 1, 0);
  let orbitRight = new THREE.Vector3().crossVectors(up, sunDir).normalize();
  if (orbitRight.lengthSq() < 0.0001) {
    orbitRight = new THREE.Vector3(1, 0, 0);
  }
  const orbitUp = new THREE.Vector3().crossVectors(sunDir, orbitRight).normalize();

  const inPlane = sunDir.clone().multiplyScalar(Math.cos(elongation))
    .add(orbitRight.clone().multiplyScalar(Math.sin(elongation)));

  const finalDir = inPlane.clone().multiplyScalar(Math.cos(latRad))
    .add(orbitUp.clone().multiplyScalar(Math.sin(latRad)))
    .normalize();

  return finalDir.multiplyScalar(distance);
}

  if (!moonMesh) return;
  moonMesh.lookAt(0, 0, 0);
  moonMesh.rotateY(Math.PI);
}

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function smoothstep(edge0, edge1, x) {
  const t = clamp01((x - edge0) / (edge1 - edge0));
  return t * t * (3.0 - 2.0 * t);
}

function closeZoomDiscBlend() {
  // 0 = full column height, 1 = flattened footprint disc.
  return 1.0 - smoothstep(DISC_MODE_FULL_RADIUS, DISC_MODE_START_RADIUS, orbit.radius);
}

function markHealthShapeDirty() {
  healthShapeDirty = true;
}

function shouldApplyHealthShapeUpdate() {
  if (!healthMode || healthTransitionActive || !healthColumnStacks.length) return false;

  const blend = closeZoomDiscBlend();
  const radiusChanged = lastAppliedShapeRadius === null || Math.abs(orbit.radius - lastAppliedShapeRadius) > 0.00035;
  const blendChanged = Math.abs(blend - lastAppliedDiscBlend) > 0.001;

  return healthShapeDirty || radiusChanged || blendChanged;
}

function zoomPanSensitivity() {
  const zoomIn = clamp01((currentConfig.maxRadius - orbit.radius) / (currentConfig.maxRadius - currentConfig.minRadius));
  return 1.0 - zoomIn * 0.82;
}

function zoomMassFactor() {
  const closeBlend = clamp01((currentConfig.discStart - orbit.radius) / (currentConfig.discStart - currentConfig.minRadius));
  return 1.0 + closeBlend * 0.5;
}

function currentCloseZoomRadius(baseRadius) {
  const blend = closeZoomDiscBlend();
  const discRadius = Math.max(0.0012, baseRadius * DISC_RADIUS_FACTOR);
  return baseRadius * (1 - blend) + discRadius * blend;
}

function clusteredGreenShare(lat, lng) {
  const a = 0.5 + 0.5 * Math.sin((lat + 18.0) * 0.11);
  const b = 0.5 + 0.5 * Math.cos((lng - 22.0) * 0.08);
  const c = 0.5 + 0.5 * Math.sin((lat + lng) * 0.045);
  const d = 0.5 + 0.5 * Math.cos((lat - lng) * 0.035);
  const raw = a * 0.34 + b * 0.28 + c * 0.22 + d * 0.16;
  return Math.pow(clamp01(raw), 1.65);
}

function nearbyCuratedAdditionalLabel(lat, lng) {
  let best = null;
  let bestScore = Infinity;
  const latR = Number(lat) * Math.PI / 180;
  const lngR = Number(lng) * Math.PI / 180;
  for (const item of CURATED_TOP200_ADDITIONAL_LABELS) {
    const clat = item.lat * Math.PI / 180;
    const clng = item.lng * Math.PI / 180;
    const dlat = clat - latR;
    const dlng = clng - lngR;
    const a = Math.sin(dlat / 2) ** 2 + Math.cos(latR) * Math.cos(clat) * Math.sin(dlng / 2) ** 2;
    const dist = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    if (dist < bestScore) {
      bestScore = dist;
      best = item;
    }
  }
  // Strict enough to avoid obvious wrong labels, loose enough for the source dataset's rounded city coordinates.
  return best && bestScore < 0.035 ? best.name : null;
}

function top100CoordKey(lat, lng) {
  return `${Number(lat).toFixed(4)}_${Number(lng).toFixed(4)}`;
}

function curatedPlaceLabel(lat, lng) {
  return CURATED_TOP100_LABELS[top100CoordKey(lat, lng)] || nearbyCuratedAdditionalLabel(lat, lng) || null;
}

function approxCityName(lat, lng) {
  // Fallback only. worldcities.csv rows use meta.placeLabel directly.
  return curatedPlaceLabel(lat, lng) || `${Number(lat).toFixed(4)}, ${Number(lng).toFixed(4)}`;
}

function setInstance(mesh, instanceId, meta, centerPos, height, radius, color) {
  const normal = centerPos.clone().normalize();
  tmpQuat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
  tmpScale.set(radius, height, radius);
  tmpMatrix.compose(centerPos, tmpQuat, tmpScale);
  mesh.setMatrixAt(instanceId, tmpMatrix);
  // Instance colors intentionally disabled; separate red/green materials control pillar color.
  meta.centerPosition = centerPos.clone();
  meta.topPosition = centerPos.clone().add(normal.clone().multiplyScalar(height * 0.5));
  meta.segmentHeight = height;
  meta.segmentRadius = radius;
  meta.originalSegmentHeight = height;
  meta.originalSegmentRadius = radius;
  meta.segmentNormal = normal.clone();
  meta.segmentBasePosition = centerPos.clone().add(normal.clone().multiplyScalar(-height * 0.5));
}

function setAnimatedInstanceHeight(mesh, instanceId, meta, heightScale) {
  const normal = meta.segmentNormal;
  const height = Math.max(0.000001, meta.segmentHeight * heightScale);
  const radius = meta.segmentRadius;

  // Anchor the segment at its original base so it grows outward/upward, not from the middle.
  const center = meta.segmentBasePosition.clone().add(normal.clone().multiplyScalar(height * 0.5));

  tmpQuat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
  tmpScale.set(radius, height, radius);
  tmpMatrix.compose(center, tmpQuat, tmpScale);
  mesh.setMatrixAt(instanceId, tmpMatrix);

  meta.centerPosition = center.clone();
  meta.topPosition = center.clone().add(normal.clone().multiplyScalar(height * 0.5));
}


function setInstanceShape(mesh, instanceId, meta, height, radius) {
  const normal = meta.segmentNormal;
  const safeHeight = Math.max(0.000001, height);
  const center = meta.segmentBasePosition.clone().add(normal.clone().multiplyScalar(safeHeight * 0.5));

  tmpQuat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
  tmpScale.set(radius, safeHeight, radius);
  tmpMatrix.compose(center, tmpQuat, tmpScale);
  mesh.setMatrixAt(instanceId, tmpMatrix);

  meta.centerPosition = center.clone();
  meta.topPosition = center.clone().add(normal.clone().multiplyScalar(safeHeight * 0.5));
}

function applyCloseZoomDiscMode() {
  if (!shouldApplyHealthShapeUpdate()) return;

  const blend = closeZoomDiscBlend();

  for (const stack of healthColumnStacks) {
    const originalRadius = stack.radius || 0.006;
    const discRadius = Math.max(0.0012, originalRadius * DISC_RADIUS_FACTOR);
    const currentRadius = originalRadius * (1 - blend) + discRadius * blend;

    let offset = 0;

    const placeSegment = (segment) => {
      if (!segment) return;

      const meta = segment.meta;
      const originalHeight = meta.originalSegmentHeight || meta.segmentHeight || 0.001;
      const discHeight = Math.max(0.0009, originalHeight * DISC_HEIGHT_FACTOR);
      const currentHeight = originalHeight * (1 - blend) + discHeight * blend;

      const center = stack.base.clone().add(stack.normal.clone().multiplyScalar(offset + currentHeight * 0.5));

      tmpQuat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), stack.normal);
      tmpScale.set(currentRadius, currentHeight, currentRadius);
      tmpMatrix.compose(center, tmpQuat, tmpScale);
      segment.mesh.setMatrixAt(segment.instanceId, tmpMatrix);

      meta.centerPosition = center;
      meta.topPosition = center.clone().add(stack.normal.clone().multiplyScalar(currentHeight * 0.5));
      meta.segmentRadius = currentRadius;
      meta.currentSegmentHeight = currentHeight;

      offset += currentHeight;
    };

    // Shared base, stacked layout: green first, red directly on top.
    placeSegment(stack.green);
    placeSegment(stack.red);
  }

  if (greenInstances) greenInstances.instanceMatrix.needsUpdate = true;
  if (redInstances) redInstances.instanceMatrix.needsUpdate = true;

  updateSelectedRingScaleForZoom();

  lastAppliedDiscBlend = blend;
  lastAppliedShapeRadius = orbit.radius;
  healthShapeDirty = false;
}

function disposeHealthInstances() {
  while (healthPillarsGroup.children.length) {
    const child = healthPillarsGroup.children.pop();
    if (child.dispose) child.dispose();
  }
  greenInstances = null;
  redInstances = null;
  healthTransitionSegments = [];
  healthTransitionActive = false;
  healthColumnStacks = [];
  healthShapeDirty = true;
  lastAppliedDiscBlend = -1;
  lastAppliedShapeRadius = null;
}

function rebuildHealthPillars(data) {
  disposeHealthInstances();

  if (!data.length) return;

  const maxPop = fullPopulationMaxPop || Math.max(...data.map(d => d.pop));
  const totalPop = data.reduce((sum, d) => sum + d.pop, 0);

  const rawShares = data.map(d => clusteredGreenShare(d.lat, d.lng));
  const rawWeightedAvg = rawShares.reduce((sum, share, idx) => sum + share * data[idx].pop, 0) / totalPop;
  const shareScale = rawWeightedAvg > 0 ? 0.20 / rawWeightedAvg : 1.0;

  const prepared = data.map((d, idx) => {
    const popNorm = Math.sqrt(d.pop / maxPop);
    const totalHeight = 0.01 + popNorm * 0.24;
    const radius = 0.0025 + popNorm * 0.0095;

    const greenShare = clamp01(rawShares[idx] * shareScale);
    const greenHeight = totalHeight * greenShare;
    const redHeight = totalHeight - greenHeight;

    const base = latLonToVec(d.lat, d.lng, 1.0015);
    const normal = base.clone().normalize();
    const pillarId = d.id || `${d.lat}_${d.lng}`;
    const meta = {
      id: d.id || null,
      source: d.source || null,
      city: d.city || null,
      cityAscii: d.cityAscii || null,
      adminName: d.adminName || null,
      placeLabel: d.placeLabel || d.city || d.cityAscii || d.adminName || null,
      isCluster: !!d.isCluster,
      clusterCount: d.clusterCount || 1,
      lat: d.lat,
      lng: d.lng,
      pop: d.pop,
      greenShare,
      redShare: 1 - greenShare,
      radius,
      pillarId,
      totalHeight
    };

    return { base, normal, greenHeight, redHeight, radius, meta };
  });

  const greenCount = prepared.filter(p => p.greenHeight > 0.0005).length;
  const redCount = prepared.filter(p => p.redHeight > 0.0005).length;

  greenInstances = new THREE.InstancedMesh(basePillarGeometry, healthPillarMaterials.green, Math.max(1, greenCount));
  redInstances = new THREE.InstancedMesh(basePillarGeometry, healthPillarMaterials.red, Math.max(1, redCount));

  greenInstances.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  redInstances.instanceMatrix.setUsage(THREE.StaticDrawUsage);

  greenInstances.userData.segmentType = 'positive';
  redInstances.userData.segmentType = 'negative';
  greenInstances.userData.metas = [];
  redInstances.userData.metas = [];

  let gi = 0;
  let ri = 0;

  for (const p of prepared) {
    if (p.greenHeight > 0.0005) {
      const center = p.base.clone().add(p.normal.clone().multiplyScalar(p.greenHeight * 0.5));
      const meta = Object.assign({ segmentType: 'positive' }, p.meta);
      setInstance(greenInstances, gi, meta, center, p.greenHeight, p.radius, HEALTH_GREEN);
      greenInstances.userData.metas[gi] = meta;
      gi++;
    }

    if (p.redHeight > 0.0005) {
      const center = p.base.clone().add(p.normal.clone().multiplyScalar(p.greenHeight + p.redHeight * 0.5));
      const meta = Object.assign({ segmentType: 'negative' }, p.meta);
      setInstance(redInstances, ri, meta, center, p.redHeight, p.radius, HEALTH_RED);
      redInstances.userData.metas[ri] = meta;
      ri++;
    }
  }

  // Cache logical column stacks once per rebuild.
  // This keeps close-zoom reshaping cheap and avoids rebuilding lookup maps every frame.
  const stackMap = new Map();
  const cacheStackSegment = (mesh, instanceId, meta) => {
    if (!meta || !meta.pillarId) return;
    let stack = stackMap.get(meta.pillarId);
    if (!stack) {
      stack = {
        pillarId: meta.pillarId,
        normal: meta.segmentNormal,
        base: meta.segmentBasePosition ? meta.segmentBasePosition.clone() : null,
        radius: meta.originalSegmentRadius || meta.segmentRadius || meta.radius || 0.006,
        green: null,
        red: null
      };
      stackMap.set(meta.pillarId, stack);
    }

    if (meta.segmentBasePosition && (!stack.base || meta.segmentBasePosition.lengthSq() < stack.base.lengthSq())) {
      stack.base = meta.segmentBasePosition.clone();
    }

    if (meta.segmentType === 'positive') {
      stack.green = { mesh, instanceId, meta };
    } else if (meta.segmentType === 'negative') {
      stack.red = { mesh, instanceId, meta };
    }
  };

  if (greenInstances) {
    const metas = greenInstances.userData.metas || [];
    for (let i = 0; i < metas.length; i++) cacheStackSegment(greenInstances, i, metas[i]);
  }

  if (redInstances) {
    const metas = redInstances.userData.metas || [];
    for (let i = 0; i < metas.length; i++) cacheStackSegment(redInstances, i, metas[i]);
  }

  healthColumnStacks = Array.from(stackMap.values()).filter(stack => stack.base && stack.normal);

  greenInstances.instanceMatrix.needsUpdate = true;
  redInstances.instanceMatrix.needsUpdate = true;
  if (greenInstances.instanceColor) greenInstances.instanceColor.needsUpdate = true;
  if (redInstances.instanceColor) redInstances.instanceColor.needsUpdate = true;

  healthPillarsGroup.add(greenInstances);
  healthPillarsGroup.add(redInstances);

  healthTransitionSegments = [];

  if (animateNextHealthRebuild) {
    // Build transition list after final matrices exist, then collapse columns to zero height.
    if (greenInstances) {
      const metas = greenInstances.userData.metas || [];
      for (let i = 0; i < metas.length; i++) {
        healthTransitionSegments.push({ mesh: greenInstances, instanceId: i, meta: metas[i] });
        setAnimatedInstanceHeight(greenInstances, i, metas[i], 0.001);
      }
      greenInstances.instanceMatrix.needsUpdate = true;
    }

    if (redInstances) {
      const metas = redInstances.userData.metas || [];
      for (let i = 0; i < metas.length; i++) {
        healthTransitionSegments.push({ mesh: redInstances, instanceId: i, meta: metas[i] });
        setAnimatedInstanceHeight(redInstances, i, metas[i], 0.001);
      }
      redInstances.instanceMatrix.needsUpdate = true;
    }

    healthTransitionStart = performance.now();
    healthTransitionActive = true;
  } else {
    healthTransitionActive = false;
    healthTransitionSegments = [];
  }

  // Reset default so non-slider rebuilds, like clustering, can animate.
  animateNextHealthRebuild = true;

  markHealthShapeDirty();
  updateHealthPillarVisibility();
}


function updateHealthColumnTransition() {
  if (!healthTransitionActive || !healthTransitionSegments.length) return;

  const elapsed = performance.now() - healthTransitionStart;
  const raw = Math.min(1, elapsed / HEALTH_TRANSITION_DURATION_MS);

  // Smooth ease-out: quick lift, gentle settle.
  const eased = 1 - Math.pow(1 - raw, 3);

  for (const seg of healthTransitionSegments) {
    setAnimatedInstanceHeight(seg.mesh, seg.instanceId, seg.meta, eased);
  }

  if (greenInstances) greenInstances.instanceMatrix.needsUpdate = true;
  if (redInstances) redInstances.instanceMatrix.needsUpdate = true;

  if (raw >= 1) {
    healthTransitionActive = false;
    healthTransitionSegments = [];
    markHealthShapeDirty();
  }
}

function pillarHeightPercentile(d) {
  if (!fullPopulationMaxPop || !d || !Number.isFinite(d.pop)) return 0;
  const popNorm = Math.sqrt(d.pop / fullPopulationMaxPop);
  const totalHeight = 0.01 + popNorm * 0.24;

  // This matches the exact height formula used by rebuildHealthPillars.
  const minHeight = 0.01;
  const maxHeight = 0.25;

  return clamp01((totalHeight - minHeight) / (maxHeight - minHeight)) * 100;
}

function clampPillarHeightHandles() {
  pillarHeightPercentMin = Math.max(0, Math.min(100, Number(pillarHeightRangeMin.value)));
  pillarHeightPercentMax = Math.max(0, Math.min(100, Number(pillarHeightRangeMax.value)));

  if (pillarHeightPercentMin >= pillarHeightPercentMax) {
    const active = document.activeElement;
    if (active === pillarHeightRangeMin) {
      pillarHeightPercentMin = pillarHeightPercentMax - 1;
      pillarHeightRangeMin.value = pillarHeightPercentMin;
    } else {
      pillarHeightPercentMax = pillarHeightPercentMin + 1;
      pillarHeightRangeMax.value = pillarHeightPercentMax;
    }
  }
}

function filteredPopulationByHeightPercentile() {
  if (!fullPopulationDataset.length) return [];

  return fullPopulationDataset.filter(d => {
    const p = pillarHeightPercentile(d);
    return p >= pillarHeightPercentMin && p <= pillarHeightPercentMax;
  });
}

function updatePillarHeightRangeUI(filteredCount = null) {
  if (pillarHeightSliderFill) {
    pillarHeightSliderFill.style.left = `${pillarHeightPercentMin}%`;
    pillarHeightSliderFill.style.width = `${pillarHeightPercentMax - pillarHeightPercentMin}%`;
  }

  if (pillarHeightRangeReadout) {
    pillarHeightRangeReadout.textContent =
      `Showing ${pillarHeightPercentMin}th – ${pillarHeightPercentMax}th percentile column height`;
  }

  if (pillarHeightRangeCount) {
    const total = fullPopulationDataset.length;
    const count = filteredCount === null ? total : filteredCount;
    const unit = healthClusterMode ? 'clustered columns' : 'columns';
    pillarHeightRangeCount.textContent = total
      ? `${count.toLocaleString()} of ${total.toLocaleString()} ${unit}`
      : 'Loading columns…';
  }
}


function clusterHealthCities(data, cellDegrees = HEALTH_CLUSTER_DEGREES) {
  if (!healthClusterMode || !data.length) return data;

  const clusters = new Map();

  for (const d of data) {
    const latCell = Math.floor((d.lat + 90) / cellDegrees);
    const lngCell = Math.floor((d.lng + 180) / cellDegrees);
    const key = `${latCell}_${lngCell}`;

    let cluster = clusters.get(key);
    if (!cluster) {
      cluster = {
        latWeighted: 0,
        lngWeighted: 0,
        pop: 0,
        cityCount: 0,
        largestCity: null,
        largestPop: -Infinity
      };
      clusters.set(key, cluster);
    }

    const pop = Number.isFinite(d.pop) ? d.pop : 0;
    cluster.pop += pop;
    cluster.latWeighted += d.lat * pop;
    cluster.lngWeighted += d.lng * pop;
    cluster.cityCount += 1;

    if (pop > cluster.largestPop) {
      cluster.largestPop = pop;
      cluster.largestCity = d;
    }
  }

  const result = [];

  for (const cluster of clusters.values()) {
    if (!cluster.pop || !cluster.largestCity) continue;

    const labelBase =
      cluster.largestCity.placeLabel ||
      cluster.largestCity.city ||
      cluster.largestCity.cityAscii ||
      cluster.largestCity.adminName ||
      'Region';

    const placeLabel = cluster.cityCount > 1
      ? `${labelBase} region`
      : labelBase;

    result.push({
      id: `cluster_${result.length}`,
      source: 'cluster',
      city: placeLabel,
      cityAscii: placeLabel,
      adminName: cluster.largestCity.adminName || null,
      placeLabel,
      lat: cluster.latWeighted / cluster.pop,
      lng: cluster.lngWeighted / cluster.pop,
      pop: cluster.pop,
      isCluster: cluster.cityCount > 1,
      clusterCount: cluster.cityCount
    });
  }

  return result.sort((a, b) => b.pop - a.pop);
}

function parseCsvLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    const next = line[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      current += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function cleanCsvValue(value) {
  return String(value || '').trim();
}

function loadWorldCitiesDataset() {
  console.log('🌍 Attempting to load local worldcities.csv...');

  return fetch('worldcities.csv', { cache: 'no-store' })
    .then(res => {
      if (!res.ok) throw new Error(`worldcities.csv not found/readable: ${res.status}`);
      return res.text();
    })
    .then(csv => {
      const lines = csv.split(/\r?\n/).filter(line => line.trim().length > 0);
      if (lines.length < 2) throw new Error('worldcities.csv appears empty');

      const header = parseCsvLine(lines[0]).map(h => cleanCsvValue(h).toLowerCase());
      const cityIdx = header.indexOf('city');
      const cityAsciiIdx = header.indexOf('city_ascii');
      const latIdx = header.indexOf('lat');
      const lngIdx = header.indexOf('lng');
      const adminIdx = header.indexOf('admin_name');
      const popIdx = header.indexOf('population');
      const idIdx = header.indexOf('id');

      if (cityIdx < 0 || latIdx < 0 || lngIdx < 0 || popIdx < 0) {
        throw new Error(`worldcities.csv missing required headers. Found: ${header.join(', ')}`);
      }

      const data = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        const city = cleanCsvValue(cols[cityIdx]);
        const cityAscii = cityAsciiIdx >= 0 ? cleanCsvValue(cols[cityAsciiIdx]) : '';
        const adminName = adminIdx >= 0 ? cleanCsvValue(cols[adminIdx]) : '';
        const id = idIdx >= 0 ? cleanCsvValue(cols[idIdx]) : '';
        const lat = parseFloat(cols[latIdx]);
        const lng = parseFloat(cols[lngIdx]);
        const pop = parseFloat(cols[popIdx]);

        if (Number.isFinite(lat) && Number.isFinite(lng) && Number.isFinite(pop) && pop > 0 && (city || cityAscii || adminName)) {
          data.push({
            id: id || `${lat}_${lng}_${city || cityAscii || adminName}`,
            city: city || cityAscii || null,
            cityAscii: cityAscii || null,
            adminName: adminName || null,
            placeLabel: city || cityAscii || adminName,
            lat,
            lng,
            pop,
            source: 'worldcities'
          });
        }
      }

      console.log(`✅ Loaded local worldcities.csv: ${data.length.toLocaleString()} cities`);
      console.log('✅ worldcities.csv first parsed city:', data[0]);
      return data;
    });
}

// ===== SYNCHRONIZED, BI-DIRECTIONAL ENERGY ARCS =====
let globalMaxArcLength = 0;

const arcShaderSource = {
  uniforms: {
    time: { value: 0 },
    colorGoa: { value: new THREE.Color(0xffd700) }, // Gold
    colorSys: { value: new THREE.Color(0xffd700) }, // Gold
    isCore: { value: 1.0 },
    arcLength: { value: 1.0 }, 
    maxArcLength: { value: 1.0 } 
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float time;
    uniform vec3 colorGoa;
    uniform vec3 colorSys;
    uniform float isCore;
    uniform float arcLength;
    uniform float maxArcLength;
    varying vec2 vUv;

    void main() {
      float V = 0.15; 
      float D_leg = maxArcLength + 0.5; 
      float D_cycle = D_leg * 2.0; 
      float d_total = time * V;
      float d_mod = mod(d_total, D_cycle);
      float isRev = step(D_leg, d_mod);
      float head_pos = d_mod - isRev * D_leg;
      float x_fwd = (1.0 - vUv.x) * arcLength; 
      float x_rev = vUv.x * arcLength;         
      float x_pixel = mix(x_fwd, x_rev, isRev);
      float dBehind = head_pos - x_pixel;
      float validMask = step(0.0, dBehind);
      float L_tail = 0.45;
      float L_head = 0.035;
      float trail = smoothstep(L_tail, 0.0, dBehind) * validMask;
      float head = smoothstep(L_head, 0.0, dBehind) * validMask;
      float baseAlpha = isCore > 0.5 ? 0.25 : 0.06;
      float pulseAlpha = trail * 0.6 + head * 1.0;
      if (isCore < 0.5) pulseAlpha *= 0.5;

      vec3 travelColor = mix(colorSys, colorGoa, isRev);
      vec3 previousColor = mix(colorGoa, colorSys, isRev);
      vec3 baseColor = mix(previousColor, travelColor, validMask);

      vec3 goldColor = vec3(1.0, 0.843, 0.0);
      float baseIsGold = 1.0 - smoothstep(0.05, 0.25, distance(baseColor, goldColor));
      float baseBoost = 1.0 + (1.0 - baseIsGold) * 0.5;
      baseColor = min(baseColor * baseBoost, vec3(1.0));

      vec3 finalColor = baseColor + (travelColor * pulseAlpha * 2.0);
      float outAlpha = (baseAlpha + pulseAlpha) * smoothstep(0.0, 0.05, vUv.x) * smoothstep(1.0, 0.95, vUv.x);
      gl_FragColor = vec4(finalColor, outAlpha);
    }
  `
};

function createArcLine() {
  const placeholderCurve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0.2, 0), new THREE.Vector3(0.2, 0, 0)
  );

  const matCore = new THREE.ShaderMaterial({
    uniforms: THREE.UniformsUtils.clone(arcShaderSource.uniforms),
    vertexShader: arcShaderSource.vertexShader,
    fragmentShader: arcShaderSource.fragmentShader,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
  });
  matCore.uniforms.isCore.value = 1.0;

  const matGlow = new THREE.ShaderMaterial({
    uniforms: THREE.UniformsUtils.clone(arcShaderSource.uniforms),

  });

  const tubeCore = new THREE.Mesh(new THREE.TubeGeometry(placeholderCurve, 64, 0.0015, 8, false), matCore);
  const tubeGlow = new THREE.Mesh(new THREE.TubeGeometry(placeholderCurve, 64, 0.0045, 8, false), matGlow);

  return { tubeCore, tubeGlow };
}


function updateArcPositions(startVec, endVec, arcObj) {
  const startLen = startVec.length();
  const endLen = endVec.length();
  const avgLen = (startLen + endLen) * 0.5;
  const styleBlendRaw = THREE.MathUtils.clamp((avgLen - 1.03) / 0.10, 0, 1);
  const styleBlend = styleBlendRaw * styleBlendRaw * (3.0 - 2.0 * styleBlendRaw);

  const globeStart = startVec.clone().normalize().multiplyScalar(1.03);
  const globeEnd = endVec.clone().normalize().multiplyScalar(1.03);
  const globeMid = globeStart.clone().add(globeEnd).multiplyScalar(0.5).normalize();
  const globeDistance = globeStart.distanceTo(globeEnd);
  const globeLift = Math.min(1.4, 0.35 + globeDistance * 0.6);
  const globeControl = globeMid.multiplyScalar(1.0 + globeLift);

  const spaceStart = startVec.clone();
  const spaceEnd = endVec.clone();
  const spaceMid = spaceStart.clone().add(spaceEnd).multiplyScalar(0.5);
  const spaceDistance = spaceStart.distanceTo(spaceEnd);
  const spaceMidRadius = spaceMid.length();
  const spaceLift = Math.min(0.55, 0.12 + spaceDistance * 0.22);
  const spaceControl = spaceMid.clone().normalize().multiplyScalar(spaceMidRadius + spaceLift);

  const start = globeStart.clone().lerp(spaceStart, styleBlend);
  const end = globeEnd.clone().lerp(spaceEnd, styleBlend);
  const control = globeControl.clone().lerp(spaceControl, styleBlend);

  const curve = new THREE.QuadraticBezierCurve3(start, control, end);
  const trueArcLength = curve.getLength();
  
  if (trueArcLength > globalMaxArcLength) {
      globalMaxArcLength = trueArcLength;
  }

  arcObj.tubeCore.material.uniforms.arcLength.value = trueArcLength;
  arcObj.tubeGlow.material.uniforms.arcLength.value = trueArcLength;
  arcObj.tubeCore.material.uniforms.maxArcLength.value = globalMaxArcLength;
  arcObj.tubeGlow.material.uniforms.maxArcLength.value = globalMaxArcLength;

  if (arcObj.tubeCore.geometry) arcObj.tubeCore.geometry.dispose();
  if (arcObj.tubeGlow.geometry) arcObj.tubeGlow.geometry.dispose();
  
  arcObj.tubeCore.geometry = new THREE.TubeGeometry(curve, 64, 0.0015, 8, false);
  arcObj.tubeGlow.geometry = new THREE.TubeGeometry(curve, 64, 0.0045, 8, false);
}

function latLonToVec(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta)
  );
}

function quadraticBezierVec3(p0, p1, p2, t) {
  const omt = 1.0 - t;
  return p0.clone().multiplyScalar(omt * omt)
    .add(p1.clone().multiplyScalar(2.0 * omt * t))
    .add(p2.clone().multiplyScalar(t * t));
}

function smoothstep01(x) {
  const t = Math.max(0.0, Math.min(1.0, x));
  return t * t * (3.0 - 2.0 * t);
}

function computeStagedOrbitPosition(earthPos, surfaceNormal, targetPos, blend) {
  const stageSplit = 0.5;
  const orbitLift = 0.28;
  const launchPoint = earthPos.clone().add(surfaceNormal.clone().multiplyScalar(orbitLift));

  if (blend <= stageSplit) {
    const t = smoothstep01(blend / stageSplit);
    return earthPos.clone().lerp(launchPoint, t);
  }

  const t = smoothstep01((blend - stageSplit) / (1.0 - stageSplit));
  const spaceMid = launchPoint.clone().add(targetPos).multiplyScalar(0.5);
  const midNormal = spaceMid.clone().normalize();
  const control = midNormal.multiplyScalar(Math.max(launchPoint.length(), targetPos.length()) + 0.18)
    .add(new THREE.Vector3(0, 0.06, 0));
  return quadraticBezierVec3(launchPoint, control, targetPos, t);
}

function getLocalBasis(normal) {
  const reference = Math.abs(normal.y) < 0.95
    ? new THREE.Vector3(0, 1, 0)
    : new THREE.Vector3(1, 0, 0);
  const tangentA = new THREE.Vector3().crossVectors(reference, normal).normalize();
  const tangentB = new THREE.Vector3().crossVectors(normal, tangentA).normalize();
  return { tangentA, tangentB };
}

function getElevatedLayoutTargets(focusSystem) {
  const center = new THREE.Vector3(0, 1.09, 0);
  const ringAxisA = new THREE.Vector3(1, 0, 0);
  const ringAxisB = new THREE.Vector3(0, 0, 1);
  const others = clickableSystems.filter(system => system !== focusSystem);
  const ringRadius = 0.42;
  const focusLift = new THREE.Vector3(0, 0.04, 0);
  const targets = new Map();

  targets.set(focusSystem, {
    position: center.clone().add(focusLift),
    anchor: center.clone().add(focusLift),
    outward: new THREE.Vector3(0, 1, 0)
  });

  others.forEach((system, idx) => {
    const angle = (idx / Math.max(1, others.length)) * Math.PI * 2 - Math.PI / 2;
    const circularOffset = ringAxisA.clone().multiplyScalar(Math.cos(angle) * ringRadius)
      .add(ringAxisB.clone().multiplyScalar(Math.sin(angle) * ringRadius));
    const elevatedPos = center.clone().add(circularOffset);
    const outward = elevatedPos.clone().sub(center).normalize().lerp(new THREE.Vector3(0, 1, 0), 0.35).normalize();
    targets.set(system, {
      position: elevatedPos,
      anchor: elevatedPos.clone(),
      outward
    });
  });

  return targets;
}

// ===== CURRENT EARTH ROTATION FROM REAL UTC =====
function currentUtcFraction() {
  const now = new Date();
  return (now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600) / 24;
}

function updateEarthSpin() {
  earthGroup.rotation.y = (currentUtcFraction() * Math.PI * 2) - Math.PI;
}

function getTargetPosition(name) {
  if (name === 'earth') return new THREE.Vector3(0, 0, 0);
  if (name === 'sun') return sun.position.clone();
  if (name === 'moon' && moon) return moon.position.clone();
  return new THREE.Vector3(0, 0, 0);
}

function flyToTarget(targetName) {
  if (!TARGET_CONFIGS[targetName]) return;
  if (isMicroView) switchToMacro();
  clearSelection();
  if (targetName === currentTargetName && !flight.active) {
    updateFlyPanelState();
    return;
  }
  flight.active = true;
  flight.startTime = performance.now();
  flight.duration = 2500;
  flight.startRadius = orbit.radius;
  flight.endRadius = TARGET_CONFIGS[targetName].defaultRadius;
  flight.startCenter.copy(dynamicCenter);
  flight.endCenterName = targetName;
  flight.startEarthScale = earthGroup.scale.x;
  flight.startTheta = orbit.theta;
  flight.startPhi = orbit.phi;
  const tPos = getTargetPosition(targetName);
  if (targetName === 'moon') { flight.endTheta = Math.atan2(tPos.x, tPos.z) + 0.4; flight.endPhi = 0.15; }
  else if (targetName === 'sun') { flight.endTheta = Math.atan2(tPos.x, tPos.z) + 0.3; flight.endPhi = 0.1; }
  else { flight.endTheta = Math.atan2(sun.position.x, sun.position.z) - 0.6; flight.endPhi = 0.25; }
  let dTheta = flight.endTheta - flight.startTheta;
  while (dTheta > Math.PI) dTheta -= Math.PI * 2;
  while (dTheta < -Math.PI) dTheta += Math.PI * 2;
  flight.endTheta = flight.startTheta + dTheta;
  currentTargetName = targetName;
  currentConfig = TARGET_CONFIGS[targetName];

  if (healthMode && targetName !== 'earth') {
    inspectPanel.classList.remove('visible');
    if (openFiltersBtn) openFiltersBtn.classList.add('visible');
  }
  setHealthOverlayForView();
  updateFlyPanelState();
}

let impactRippleActive = false;
let impactRippleStart = 0;
const IMPACT_RIPPLE_DURATION_MS = 620;


function triggerImpactRipple(meta) {
  if (!meta || !meta.topPosition || !impactRipple) return;

  const baseRadius = currentCloseZoomRadius(meta.originalSegmentRadius || meta.radius || meta.segmentRadius || 0.008);
  const inner = Math.max(0.004, baseRadius * 1.35);
  const outer = inner + Math.max(0.0015, inner * 0.32);

  if (impactRipple.geometry) impactRipple.geometry.dispose();
  impactRipple.geometry = new THREE.RingGeometry(inner, outer, 96);

  impactRipple.position.copy(meta.topPosition);
  impactRipple.lookAt(new THREE.Vector3(0, 0, 0));
  impactRipple.scale.setScalar(0.65);
  impactRipple.material.opacity = 0.0;
  impactRipple.visible = true;

  impactRippleStart = performance.now();
  impactRippleActive = true;
}

function updateImpactRipple() {
  if (!impactRippleActive || !impactRipple) return;

  const raw = Math.min(1, (performance.now() - impactRippleStart) / IMPACT_RIPPLE_DURATION_MS);
  const eased = 1 - Math.pow(1 - raw, 3);

  impactRipple.scale.setScalar(0.65 + eased * 2.4);
  impactRipple.material.opacity = Math.max(0, 0.72 * (1 - eased));

  if (raw >= 1) {
    impactRippleActive = false;
    impactRipple.visible = false;
    impactRipple.material.opacity = 0.0;
    impactRipple.scale.setScalar(1);
  }
}

function healthSegmentColor(segmentType) {
  return segmentType === 'positive' ? 0x16a34a : 0xdc2626;
}

function clearSelectedPillarOverlay() {
  while (selectedPillarOverlayGroup.children.length) {
    const child = selectedPillarOverlayGroup.children.pop();
    if (child.geometry && child.geometry !== basePillarGeometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  selectedPillarOverlayGroup.visible = false;
}

function findSelectedPillarSegments(pillarId) {
  const matches = [];
  const sources = [greenInstances, redInstances].filter(Boolean);

  for (const source of sources) {
    const metas = source.userData.metas || [];
    for (let i = 0; i < metas.length; i++) {
      if (metas[i].pillarId === pillarId) {
        matches.push({ source, instanceId: i, meta: metas[i] });
      }
    }
  }

  return matches;
}

function buildSelectedPillarOverlay(pillarId) {
  clearSelectedPillarOverlay();
  if (!pillarId) return;

  const matches = findSelectedPillarSegments(pillarId);
  const matrix = new THREE.Matrix4();

  for (const match of matches) {
    // Respect active positive/negative filters.
    if (healthOnlyPositive && match.meta.segmentType !== 'positive') continue;
    if (healthOnlyNegative && match.meta.segmentType !== 'negative') continue;

    match.source.getMatrixAt(match.instanceId, matrix);

    const overlay = new THREE.Mesh(
      basePillarGeometry,
      new THREE.MeshBasicMaterial({
  color: healthSegmentColor(match.meta.segmentType),
  transparent: true,
  opacity: HEALTH_FOCUS_FULL_OPACITY,

  // 👇 CRITICAL FIXES
  depthTest: true,
  depthWrite: true,

  // prevents visual "doubling" / shimmer
  polygonOffset: true,
  polygonOffsetFactor: -1,
  polygonOffsetUnits: -1
})
    );

    overlay.matrixAutoUpdate = false;
    overlay.matrix.copy(matrix);
    overlay.renderOrder = 1001;
    selectedPillarOverlayGroup.add(overlay);
  }

  selectedPillarOverlayGroup.visible = selectedPillarOverlayGroup.children.length > 0;
}

function setHealthInstanceOpacity(opacity) {
  if (greenInstances) greenInstances.material.opacity = opacity;
  if (redInstances) redInstances.material.opacity = opacity;

function updatePillarSelectionFade() {

  setHealthInstanceOpacity(HEALTH_FOCUS_DIM_OPACITY);

}

// ===== INTERACTION =====
let dragging = false, lastX = 0, lastY = 0, pointerMoved = false;
const DRAG_THRESHOLD = 5;

// ===== TAKE292 MOBILE TOUCH / PINCH ZOOM =====
// Mobile behavior:
// - one finger drag keeps existing globe rotation
// - two-finger pinch zooms in/out
// - existing 3D→2D transition threshold is unchanged
let mobilePinching = false;
let mobileLastPinchDistance = 0;

function mobileTouchDistance(touches) {
  if (!touches || touches.length < 2) return 0;
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function mobileTouchCenter(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) * 0.5,
    y: (touches[0].clientY + touches[1].clientY) * 0.5
  };
}

function applyMobileZoom(deltaPixels, centerX, centerY) {
  if (flight.active || isMicroView) return;

  const syntheticDeltaY = -deltaPixels * 2.25;
  const zoomAmount = (syntheticDeltaY * ORBIT_ZOOM_SPEED) / zoomMassFactor();

  orbit.radius += zoomAmount;

  if (currentTargetName === 'earth') {
    const rect = canvas.getBoundingClientRect();
    const x = ((centerX - rect.left) / rect.width) * 2 - 1;
    const y = -((centerY - rect.top) / rect.height) * 2 + 1;

    const panStrength = 0.6;
    orbit.theta -= x * zoomAmount * panStrength;
    orbit.phi -= y * zoomAmount * panStrength;
  }

  orbit.phi = Math.max(-1.25, Math.min(1.25, orbit.phi));

  if (currentTargetName === 'earth' && orbit.radius <= currentConfig.minRadius && syntheticDeltaY < 0) {
    const loc = getScreenCenterLatLng();
    if (loc) {
      switchToMicro(loc.lat, loc.lng);
      return;
    }
  }

  orbit.radius = Math.max(currentConfig.minRadius, Math.min(currentConfig.maxRadius, orbit.radius));
  updateCamera();
  markHealthShapeDirty();
  applyCloseZoomDiscMode();
  setHealthOverlayForView();
}


canvas.addEventListener('pointerdown', (e) => {
  if (mobilePinching) return;
  if (isMicroView) return;
  pointerMoved = false;
  if (!elevatedMode && elevateTransitionActive) {
    elevateTransitionActive = false;
  }
  dragging = true; pointerMoved = false; lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('pointermove', (e) => {
  if (mobilePinching) return;
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  if (isMicroView) return;
  if (!dragging && healthMode) {
    projectPointer(e);
    raycaster.setFromCamera(pointer, camera);
    const targets = [greenInstances, redInstances].filter(mesh => mesh && mesh.visible);
    const intersects = raycaster.intersectObjects(targets, false);

    if (intersects.length > 0 && intersects[0].instanceId !== undefined) {
      const meta = (intersects[0].object.userData.metas || [])[intersects[0].instanceId];
      showCityHoverFlag(meta, e.clientX, e.clientY);
    } else {
      hideCityHoverFlag();
    }
    return;
  }

  hideCityHoverFlag();

  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) pointerMoved = true;
  const panSpeed = zoomPanSensitivity() / zoomMassFactor();
  orbit.theta -= dx * 0.005 * panSpeed;
  orbit.phi += dy * 0.004 * panSpeed;
  orbit.phi = Math.max(-1.25, Math.min(1.25, orbit.phi));
  lastX = e.clientX; lastY = e.clientY;
  updateCamera();
});
canvas.addEventListener('pointerup', (e) => {
  // Systems should only be clickable in Show Energy mode.
  // In Show Health mode, pillar clicks are handled by the separate health click handler.
  if (!pointerMoved && connectionsMode && !healthMode) {
    projectPointer(e);
    raycaster.setFromCamera(pointer, camera);
    const intersectedSystem = clickableSystems.find(system => raycaster.intersectObject(system.dome, false).length);
    if (intersectedSystem) {
      openInspectPanel(intersectedSystem);
    } else if (!inspectPanel.contains(e.target)) {
      closeInspectPanel();
    }
  }
  dragging = false;
});
canvas.addEventListener('pointerleave', () => { dragging = false; hideCityHoverFlag(); });

// ===== TAKE254 CENTER-SYNC ZOOM TRIGGER =====
function getScreenCenterLatLng() {
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const intersects = raycaster.intersectObject(earth, false);
  if (intersects.length > 0) {
    const pt = intersects[0].point.clone();
    earthGroup.worldToLocal(pt);
    pt.normalize();

    const lat = Math.asin(pt.y) * (180 / Math.PI);
    let lng = Math.atan2(pt.z, -pt.x) * (180 / Math.PI) - 180;

    while (lng < -180) lng += 360;
    while (lng > 180) lng -= 360;

    return { lat, lng };
  }
  return null;
}


canvas.addEventListener('touchstart', (e) => {
  if (isMicroView) return;
  if (e.touches.length === 2) {
    e.preventDefault();
    mobilePinching = true;
    dragging = false;
    pointerMoved = true;
    mobileLastPinchDistance = mobileTouchDistance(e.touches);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (isMicroView) return;
  if (e.touches.length === 2 && mobilePinching) {
    e.preventDefault();
    const dist = mobileTouchDistance(e.touches);
    const center = mobileTouchCenter(e.touches);
    const delta = dist - mobileLastPinchDistance;
    mobileLastPinchDistance = dist;
    applyMobileZoom(delta, center.x, center.y);
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) {
    mobilePinching = false;
    mobileLastPinchDistance = 0;
  }
}, { passive: false });

canvas.addEventListener('touchcancel', () => {
  mobilePinching = false;
  mobileLastPinchDistance = 0;
}, { passive: false });

canvas.addEventListener('wheel', (e) => {
  if (flight.active || isMicroView) return;
  e.preventDefault();
  const zoomAmount = (e.deltaY * ORBIT_ZOOM_SPEED) / zoomMassFactor();
  orbit.radius += zoomAmount;
  if (currentTargetName === 'earth') {
    const panStrength = 0.6;
    orbit.theta -= mouse.x * zoomAmount * panStrength;
    orbit.phi -= mouse.y * zoomAmount * panStrength;
  }
  orbit.phi = Math.max(-1.25, Math.min(1.25, orbit.phi));
  if (currentTargetName === 'earth' && orbit.radius <= currentConfig.minRadius && e.deltaY < 0) {
    const loc = getScreenCenterLatLng();
    if (loc) { switchToMicro(loc.lat, loc.lng); return; }
  }
  orbit.radius = Math.max(currentConfig.minRadius, Math.min(currentConfig.maxRadius, orbit.radius));
  updateCamera();
  markHealthShapeDirty();
  applyCloseZoomDiscMode();
  setHealthOverlayForView();
}, { passive: false });
