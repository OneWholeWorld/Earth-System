  }
});


function normalizeFlySearchText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .trim();
}

function formatFlyLabel(d) {
  const city = d.city || d.placeLabel || '';
  const region = d.adminName || '';
  if (region) return `${city}, ${region}`;
  return city;
}

function flyLabelForDatum(d) {
  return d.placeLabel || d.city || d.cityAscii || d.adminName || approxCityName(d.lat, d.lng);
}

function findFlyMatches(query) {
  const q = normalizeFlySearchText(query);
  if (!q || q.length < 2 || !fullPopulationDataset.length) return [];

  return fullPopulationDataset
    .map(d => {
      const label = formatFlyLabel(d);
      const haystack = normalizeFlySearchText([
        d.placeLabel,
        d.city,
        d.cityAscii,
        d.adminName
      ].filter(Boolean).join(' '));

      let score = 999;
      if (haystack === q) score = 0;
      else if (haystack.startsWith(q)) score = 1;
      else if (haystack.includes(q)) score = 2;

      return { d, label, score };
    })
    .filter(item => item.score < 999)
    .sort((a, b) => a.score - b.score || b.d.pop - a.d.pop)
    .slice(0, 10);
}

function orbitAnglesForLatLng(lat, lng) {
  // Use the exact same coordinate convention as the columns,
  // then apply Earth's current rotation because columns are inside earthGroup.
  const v = latLonToVec(lat, lng, 1)
    .applyAxisAngle(new THREE.Vector3(0, 1, 0), earthGroup.rotation.y)
    .normalize();

  return {
    theta: Math.atan2(v.x, v.z),
    phi: Math.asin(v.y)
  };
}




function sceneVecForLatLng(lat, lng, radius = 1.035) {
  return latLonToVec(lat, lng, radius)
    .applyAxisAngle(new THREE.Vector3(0, 1, 0), earthGroup.rotation.y);
}

function selectedMetaForFlyOrigin() {
  if (selectedPillar) {
    const matches = findSelectedPillarSegments(selectedPillar);
    if (matches.length) return matches[0].meta;
  }
  return null;
}

function currentViewSurfaceDatumFallback() {
  // Fallback origin when no city is selected yet:
  // use the approximate point on Earth that the camera is looking from.
  const dir = camera.position.clone().normalize();
  return {
    lat: THREE.MathUtils.radToDeg(Math.asin(dir.y)),
    lng: THREE.MathUtils.radToDeg(Math.atan2(dir.z, -dir.x)) - 180
  };
}

function setupFlyPulseArc(originDatum, targetDatum) {
  if (!flyPulseArc || !originDatum || !targetDatum) return;

  const startVec = sceneVecForLatLng(originDatum.lat, originDatum.lng, 1.045);
  const endVec = sceneVecForLatLng(targetDatum.lat, targetDatum.lng, 1.045);

  updateArcPositions(endVec, startVec, flyPulseArc);

  flyPulseArc.tubeCore.visible = true;
  flyPulseArc.tubeGlow.visible = true;

  flyPulseArc.tubeCore.material.uniforms.colorGoa.value.setHex(0xffd700);
  flyPulseArc.tubeGlow.material.uniforms.colorGoa.value.setHex(0xffd700);
  flyPulseArc.tubeCore.material.uniforms.colorSys.value.setHex(0xffd700);
  flyPulseArc.tubeGlow.material.uniforms.colorSys.value.setHex(0xffd700);

  flyPulseArc.tubeCore.material.uniforms.time.value = 0;
  flyPulseArc.tubeGlow.material.uniforms.time.value = 0;
}

function hideFlyPulseArc(delay = 2200) {
  if (!flyPulseArc) return;
  setTimeout(() => {
    if (!cinematicFlyActive) {
      flyPulseArc.tubeCore.visible = false;
      flyPulseArc.tubeGlow.visible = false;
    }
  }, delay);
}

function updateFlyPulseTime(progress) {
  if (!flyPulseArc) return;

  // Push the shader pulse forward during the flight.
  const pulseTime = progress * 18.0;
  flyPulseArc.tubeCore.material.uniforms.time.value = pulseTime;
  flyPulseArc.tubeGlow.material.uniforms.time.value = pulseTime;
}

function findRenderedInstanceForDatum(d) {
  if (!d) return null;

  const sources = [greenInstances, redInstances].filter(mesh => mesh && mesh.visible);
  let best = null;
  let bestScore = Infinity;

  for (const mesh of sources) {
    const metas = mesh.userData.metas || [];
    for (let i = 0; i < metas.length; i++) {
      const meta = metas[i];
      if (!meta) continue;

      let score = Infinity;

      if (d.id && meta.id === d.id) {
        score = 0;
      } else {
        score = Math.abs((meta.lat || 0) - d.lat) + Math.abs((meta.lng || 0) - d.lng);
      }

      // Prefer the top/visible negative segment when both segments represent the same city.
      if (score < bestScore || (score === bestScore && meta.segmentType === 'negative')) {
        bestScore = score;
        best = { mesh, instanceId: i, meta };
      }
    }
  }

  return best;
}

function selectRenderedDatumOnArrival(d) {
  const found = findRenderedInstanceForDatum(d);
  if (!found) return false;

  selectPillarFromInstance(
    found.mesh,
    found.instanceId,
    Math.round(window.innerWidth * 0.50),
    Math.round(window.innerHeight * 0.50)
  );

  return true;
}

function easeInOutCubic(t) {
  return t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function findClosestPillar(lat, lng) {
  let best = null;
  let bestDist = Infinity;

  for (const d of fullPopulationDataset) {
    const dist = Math.abs(d.lat - lat) + Math.abs(d.lng - lng);
    if (dist < bestDist) {
      bestDist = dist;
      best = d;
    }
  }
  return best;
}

function selectPillarByDatum(d) {
  if (!d) return;
  if (selectRenderedDatumOnArrival(d)) return;

  // Fallback only if the rendered instance cannot be found.
  showTooltip(d, window.innerWidth / 2, window.innerHeight / 2);
}


function flyToDatum(d) {
  if (!d) return;

  // Search/fly-to is precision intent: always reveal the exact raw city.
  if (healthClusterMode) {
    healthClusterMode = false;
    updateHealthClusterButton();
    animateNextHealthRebuild = false;
    updatePillarHeightPercentileFilter();
  }

  // ---- PULSE ORIGIN
  // Use the last city the user selected/flew to, even if it has since been deselected.
  // Camera still starts from the user's current POV.
  const selectedOrigin = selectedMetaForFlyOrigin();
  const fallbackOrigin = currentViewSurfaceDatumFallback();
  const pulseOrigin = lastSelectedCityForOrigin || selectedOrigin || fallbackOrigin;

  clearSelection();
  hideCityHoverFlag();

  setupFlyPulseArc(pulseOrigin, d);
  cinematicFlyActive = true;

  const target = orbitAnglesForLatLng(d.lat, d.lng);

  const startTheta = orbit.theta;
  const startPhi = orbit.phi;
  const startRadius = orbit.radius;

  const midRadius = Math.min(ORBIT_MAX_RADIUS, Math.max(startRadius + 1.2, 3.2));
  const endRadius = ORBIT_MIN_RADIUS + 0.04;

  const duration = 10500;
  const startTime = performance.now();

  function step() {
    const raw = Math.min(1, (performance.now() - startTime) / duration);

    const pulseProgress = easeInOutCubic(raw);
    const cameraProgress = easeInOutCubic(clamp01((raw - 0.12) / 0.88));

    orbit.theta = lerpAngle(startTheta, target.theta, cameraProgress);
    orbit.phi = startPhi + (target.phi - startPhi) * cameraProgress;

    let radius;
    if (raw < 0.42) {
      const tt = easeInOutCubic(raw / 0.42);
      radius = startRadius + (midRadius - startRadius) * tt;
    } else {
      const tt = easeInOutCubic((raw - 0.42) / 0.58);
      radius = midRadius + (endRadius - midRadius) * tt;
    }

    orbit.radius = radius;

    updateFlyPulseTime(pulseProgress);
    updateCamera();
    markHealthShapeDirty();
    applyCloseZoomDiscMode();

    if (raw < 1) {
      requestAnimationFrame(step);
    } else {
      cinematicFlyActive = false;

      // Camera may arrive first; wait for the pulse impact before activation.
      const PULSE_IMPACT_DELAY_MS = 0;

      (function(){
        markHealthShapeDirty();
        applyCloseZoomDiscMode();

        const targetData = findClosestPillar(d.lat, d.lng);
        if (targetData) {
          const found = findRenderedInstanceForDatum(targetData);
          if (found && found.meta) triggerImpactRipple(found.meta);

          selectPillarByDatum(targetData);
          lastSelectedCityForOrigin = targetData;
        }

        hideFlyPulseArc(2200);
      })();
    }
  }

  step();
}



function renderFlySuggestions(query) {
  if (!flySuggestions) return;

  const matches = findFlyMatches(query);
  flySuggestions.innerHTML = '';

  if (!matches.length) {
    flySuggestions.style.display = 'none';
    return;
  }

  for (const item of matches) {
    const row = document.createElement('div');
    row.style.padding = '9px 11px';
    row.style.cursor = 'pointer';
    row.style.color = '#eef4ff';
    row.style.borderBottom = '1px solid rgba(255,255,255,.08)';
    row.style.display = 'flex';
    row.style.justifyContent = 'space-between';
    row.style.gap = '10px';

    const name = document.createElement('span');
    name.textContent = item.label;

    const pop = document.createElement('span');
    pop.textContent = Math.round(item.d.pop).toLocaleString();
    pop.style.color = '#9fb3d9';
    pop.style.fontSize = '10px';
    pop.style.flex = '0 0 auto';

    row.appendChild(name);
    row.appendChild(pop);

    row.addEventListener('mouseenter', () => row.style.background = 'rgba(255,255,255,.10)');
    row.addEventListener('mouseleave', () => row.style.background = 'transparent');
    row.addEventListener('click', () => {
      flyInput.value = item.label;
      flySuggestions.style.display = 'none';
      console.log(`✈️ Flying to ${item.label}: ${item.d.lat}, ${item.d.lng}`);
      flyToDatum(item.d);
    });

    flySuggestions.appendChild(row);
  }

  flySuggestions.style.display = 'block';
}

function setupFlySearch() {
  if (!flyInput || !flySuggestions) {
    console.warn('Fly search UI not found');
    return;
  }

  flyInput.addEventListener('input', () => {
    renderFlySuggestions(flyInput.value);
  });

  flyInput.addEventListener('focus', () => {
    renderFlySuggestions(flyInput.value);
  });

  flyInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      flySuggestions.style.display = 'none';
      flyInput.blur();
    }
  });

  document.addEventListener('click', (e) => {
    if (e.target === flyInput || flySuggestions.contains(e.target)) return;
    flySuggestions.style.display = 'none';
  });

  console.log('✅ Fly-to-city search ready');
  console.log('✅ Cinematic fly-to pulse arc enabled: instant pulse impact triggers ripple + selection; fly-to switches to raw city mode.');
}

setupFlySearch();


document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeInspectPanel();
});


pillarHeightRangeMin.addEventListener('input', handlePillarHeightRangeInput);
pillarHeightRangeMax.addEventListener('input', handlePillarHeightRangeInput);
updatePillarHeightRangeUI();

// ===== ANIMATION =====
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  updateEarthSpin();

  if (flight.active) {
    const elapsed = performance.now() - flight.startTime;
    let p = Math.min(elapsed / flight.duration, 1.0);
    let flightP = Math.min(p / 0.65, 1.0);
    flightP = flightP * flightP * (3 - 2 * flightP);
    let panP = Math.max(0, (p - 0.65) / 0.35);
    panP = panP * panP * (3 - 2 * panP);
    const endPos = getTargetPosition(flight.endCenterName);
    dynamicCenter.lerpVectors(flight.startCenter, endPos, flightP);
    orbit.radius = flight.startRadius + (flight.endRadius - flight.startRadius) * flightP;
    const currentScale = flight.startEarthScale + (TARGET_CONFIGS[flight.endCenterName].earthScale - flight.startEarthScale) * flightP;
    earthGroup.scale.setScalar(currentScale);
    orbit.theta = flight.startTheta + (flight.endTheta - flight.startTheta) * panP;
    orbit.phi = flight.startPhi + (flight.endPhi - flight.startPhi) * panP;
    if (p >= 1.0) flight.active = false;
  } else {
    dynamicCenter.copy(getTargetPosition(currentTargetName));
    earthGroup.scale.setScalar(TARGET_CONFIGS[currentTargetName].earthScale);
  }

  nightMaterial.uniforms.lightDir.value.copy(sun.position).normalize();
  atmosphereMaterial.uniforms.lightDir.value.copy(sun.position).normalize();
  auroraMaterial.uniforms.lightDir.value.copy(sun.position).normalize();
  auroraMaterial.uniforms.time.value = t;

  const isConn = connectionsMode;
  
  // Keep Energy mode cinematic, but make Health mode surface more readable.
  const targetMode = isConn ? 1.0 : (healthMode ? 0.69 : 0.0);
  nightMaterial.uniforms.uMode.value += (targetMode - nightMaterial.uniforms.uMode.value) * 0.1;
  auroraMaterial.uniforms.uMode.value = nightMaterial.uniforms.uMode.value;

  updateHealthPillarVisibility();
  if (healthMode) {
    updateHealthColumnTransition();
    if (shouldApplyHealthShapeUpdate()) applyCloseZoomDiscMode();
  }
  if (!healthMode) {
    if (pillarRing) pillarRing.visible = false;
    if (tooltip) tooltip.style.display = 'none';
    hideCityHoverFlag();
    if (impactRipple) impactRipple.visible = false;
    impactRippleActive = false;
    selectedPillar = null;
  }

  const elevateBlendRate = elevatedMode ? 0.01 : 0.005;
  elevateBlend += ((elevatedMode ? 1.0 : 0.0) - elevateBlend) * elevateBlendRate;
  const easedElevateBlend = elevateBlend * elevateBlend * (3.0 - 2.0 * elevateBlend);

  if (elevateTransitionActive && elevatedMode) {
    autoPanDelay = Math.min(1.0, autoPanDelay + 0.01);
    const delayedPanBlend = Math.max(0.0, Math.min(1.0, (autoPanDelay - 0.16) / 0.58));
    const easedPanBlend = delayedPanBlend * delayedPanBlend * (3.0 - 2.0 * delayedPanBlend);
    const targetPhi = 1.25;
    orbit.phi += (targetPhi - orbit.phi) * (0.006 * easedPanBlend);
    updateCamera();
    if (elevateBlend > 0.985) {
      elevateTransitionActive = false;
    }
  }

  clickableSystems.forEach(system => {
    const surface = system === primarySystem
      ? base.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), earthGroup.rotation.y)
      : system.base.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), earthGroup.rotation.y);
    const outward = surface.clone().normalize();
    const pos = surface.clone().add(outward.clone().multiplyScalar(domeHeight));
    const anchor = outward.clone().multiplyScalar(1.03);

    system.surfacePosition = surface;
    system.surfaceNormal = outward;
    system.earthPosition = pos;
    system.earthAnchor = anchor;
  });

  const elevatedTargets = getElevatedLayoutTargets(focusedSystem);

  if (formationRetargetActive) {
    formationRetargetBlend = Math.min(1.0, formationRetargetBlend + 0.0175);
    if (formationRetargetBlend >= 0.999) {
      formationRetargetActive = false;
      formationRetargetBlend = 1.0;
      formationRetargetStarts.clear();
    }
  }

  clickableSystems.forEach(system => {
    const target = elevatedTargets.get(system);
    let currentPos;
    let currentAnchor;
    let currentOutward;

    if (elevatedMode && formationRetargetActive && formationRetargetStarts.has(system)) {
      const retargetEase = formationRetargetBlend * formationRetargetBlend * (3.0 - 2.0 * formationRetargetBlend);
      const start = formationRetargetStarts.get(system);
      currentPos = start.position.clone().lerp(target.position, retargetEase);
      currentAnchor = start.anchor.clone().lerp(target.anchor, retargetEase);
      currentOutward = start.outward.clone().lerp(target.outward, retargetEase).normalize();
    } else {
      currentPos = computeStagedOrbitPosition(system.earthPosition, system.surfaceNormal, target.position, easedElevateBlend);
      currentAnchor = computeStagedOrbitPosition(system.earthAnchor, system.surfaceNormal, target.anchor, easedElevateBlend);
      currentOutward = system.surfaceNormal.clone().lerp(target.outward, easedElevateBlend).normalize();
    }

    system.g.position.copy(currentPos);
    system.g.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), currentOutward);
    applySystemColors(system);
    const isHighlighted =
      (selectedSystem === system) ||
      (selectedSystem === null && focusedSystem === system);
    const pulseWave = isHighlighted ? (0.5 + 0.5 * Math.sin(t * 1.8)) : (0.5 + 0.5 * Math.sin(t));
    const domeScale = isHighlighted ? (1.0 + pulseWave * 0.055) : (1.0 + Math.sin(t) * 0.02);
    const glowScale = isHighlighted ? (1.02 + pulseWave * 0.095) : (1.0 + Math.sin(t) * 0.02);
    system.dome.scale.setScalar(domeScale);
    system.glow.scale.setScalar(glowScale);
    system.glow.material.opacity = isHighlighted ? (0.09 + pulseWave * 0.08) : 0.06;
    system.currentPosition = currentPos;
    system.currentAnchor = currentAnchor;
    system.currentOutward = currentOutward;
    system.g.visible = connectionsMode && !healthMode && !isMicroView;
  });


  if (elevateTransitionActive && !elevatedMode) {
    const focusViewDir = focusedSystem.earthPosition.clone().normalize();
    const targetPhi = Math.max(-1.25, Math.min(1.25, Math.asin(focusViewDir.y)));
    const targetTheta = Math.atan2(focusViewDir.x, focusViewDir.z);
    orbit.radius += (descendCameraRadius - orbit.radius) * 0.04;
    orbit.phi += (targetPhi - orbit.phi) * 0.015;
    orbit.theta = lerpAngle(orbit.theta, targetTheta, 0.015);
    updateCamera();
    if (elevateBlend < 0.05) {
      elevateTransitionActive = false;
    }
  }

  const others = clickableSystems.filter(system => system !== focusedSystem);
  const focusColors = getSystemColors(focusedSystem.state);

  connectionPool.forEach((arc, idx) => {
    const targetSystem = others[idx];
    const showArc = isConn && !!targetSystem;
    arc.tubeCore.visible = showArc;
    arc.tubeGlow.visible = showArc;

    if (!showArc) return;

    updateArcPositions(focusedSystem.currentAnchor, targetSystem.currentAnchor, arc);

    const targetColors = getSystemColors(targetSystem.state);
    arc.tubeCore.material.uniforms.colorGoa.value.setHex(focusColors.pulse);
    arc.tubeGlow.material.uniforms.colorGoa.value.setHex(focusColors.pulse);
    arc.tubeCore.material.uniforms.colorSys.value.setHex(targetColors.pulse);
    arc.tubeGlow.material.uniforms.colorSys.value.setHex(targetColors.pulse);

    if (showArc) {
      arc.tubeCore.material.uniforms.time.value = t;
      arc.tubeGlow.material.uniforms.time.value = t;
    }
  });

  t += 0.04;

  const sunPulse = 1 + Math.sin(t * 0.55) * 0.035;
  sunGlow.scale.set(1.28 * sunPulse, 1.28 * sunPulse, 1);
  raysGroup.rotation.z += 0.0008;

  updateImpactRipple();

  if (pillarRing && pillarRing.visible) {
    const ringPulse = 1.0 + Math.sin(t * 2.2) * 0.055;
    pillarRing.scale.set(ringPulse, ringPulse, ringPulse);
    pillarRing.material.opacity = 0.78 + (0.5 + 0.5 * Math.sin(t * 2.2)) * 0.22;
  } else if (pillarRing) {
    pillarRing.scale.set(1, 1, 1);
  }

  if (moon) {
    moon.position.copy(getApproxMoonScenePosition(moonDistance));
    orientMoonTowardEarth(moon);
  }

  
setHealthOverlayForView();
  if (!isMicroView) updateCamera();
  setHealthOverlayForView();
  if (!isMicroView) renderer.render(scene, camera);

}
animate();
</script>
