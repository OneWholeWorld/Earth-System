<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>globe.take75 — Expanded Synchronized Pulses & Health Heatmap</title>
<style>
html,body{margin:0;overflow:hidden;background:black}
canvas{display:block}
#hud{
  position:fixed;left:16px;top:16px;z-index:10;
  padding:10px 12px;border-radius:12px;
  background:rgba(8,12,24,.55);backdrop-filter:blur(10px);
  color:#eef4ff;font:12px/1.4 Inter,system-ui,sans-serif;
  border:1px solid rgba(255,255,255,.12);
  min-width: 180px;
}
#showConnectionsBtn, #showHealthBtn{
  display:block;
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:10px;
  padding:9px 10px;
  cursor:pointer;
  color:white;
  font:600 12px/1.2 Inter,system-ui,sans-serif;
  background:rgba(255,255,255,.12);
  transition: all 0.2s ease;
}
#showConnectionsBtn:hover, #showHealthBtn:hover {
  background:rgba(255,255,255,.2);
}
#showConnectionsBtn.active{
  background:rgba(212,175,55,.85);
  color:#111827;
}
#showHealthBtn.active{
  background:rgba(220, 38, 38, 0.85); 
  color:#ffffff;
}

#inspectPanel{
  position:fixed;
  top:16px;
  right:16px;
  width:280px;
  z-index:20;
  padding:14px 16px;
  border-radius:16px;
  background:rgba(8,12,24,.72);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.12);
  color:#eef4ff;
  font:13px/1.4 Inter,system-ui,sans-serif;
  display:none;
}
#inspectPanel.visible{display:block}
#inspectPanel h3{
  margin:0 28px 6px 0;
  font-size:16px;
}
#inspectPanel p{
  margin:0 0 12px 0;
  color:#bcd0f5;
  font-size:12px;
}
#closeInspectBtn{
  position:absolute;
  top:10px;
  right:10px;
  width:28px;
  height:28px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  color:#eef4ff;
  cursor:pointer;
  font:600 16px/1 Inter,system-ui,sans-serif;
}
#closeInspectBtn:hover{background:rgba(255,255,255,.2)}
.inspectBtns{display:flex;flex-direction:column;gap:8px}
.inspectBtns button{
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  color:white;
  font-weight:600;
}
#satisfiedBtn{background:#16a34a}
#notSatisfiedBtn{background:#dc2626}
#focusEnergyBtn{background:rgba(212,175,55,.85);color:#111827}
#elevateBtn{background:rgba(99,102,241,.85)}


/* Health filter panel mode */
body.health-panel-mode #satisfiedBtn,
body.health-panel-mode #notSatisfiedBtn,
body.health-panel-mode #focusEnergyBtn,
body.health-panel-mode #elevateBtn{
  display:none !important;
}
body:not(.health-panel-mode) #healthPositiveBtn,
body:not(.health-panel-mode) #healthNegativeBtn{
  display:none !important;
}

#healthPositiveBtn,
#healthNegativeBtn{
  width:100%;
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  font-weight:600;
  background:rgba(255,255,255,.06);
}
#healthPositiveBtn{
  color:#9df0b5;
  border:2px solid rgba(22,163,74,.9);
}
#healthPositiveBtn.active{
  background:#16a34a;
  color:#ffffff;
  border-color:#16a34a;
}
#healthNegativeBtn{
  color:#ff9e9e;
  border:2px solid rgba(220,38,38,.9);
}
#healthNegativeBtn.active{
  background:#dc2626;
  color:#ffffff;
  border-color:#dc2626;
}

</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <button id="showConnectionsBtn">Show Energy</button>
  <button id="showHealthBtn">Show Health</button>
</div>

<div id="inspectPanel">
  <button id="closeInspectBtn" aria-label="Close">×</button>
  <h3 id="inspectTitle">Inspect System</h3>
  <p id="inspectSubtitle">Set the system state.</p>
  <div class="inspectBtns">
    <button id="satisfiedBtn">Satisfied</button>
    <button id="notSatisfiedBtn">Not Satisfied</button>
    <button id="focusEnergyBtn">Focus Energy</button>
    <button id="elevateBtn">Ascend</button>
    <button id="healthPositiveBtn">Show Only Positive</button>
    <button id="healthNegativeBtn">Show Only Negative</button>
  </div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);

// ===== CAMERA ORBIT =====
const orbit = {
  radius: 3.1,
  theta: 0,
  phi: 0.22
};

function updateCamera() {
  const r = orbit.radius;
  const cp = Math.cos(orbit.phi);
  camera.position.set(
    Math.sin(orbit.theta) * cp * r,
    Math.sin(orbit.phi) * r,
    Math.cos(orbit.theta) * cp * r
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

const inspectPanel = document.getElementById('inspectPanel');
const inspectTitle = document.getElementById('inspectTitle');
const inspectSubtitle = document.getElementById('inspectSubtitle');
const satisfiedBtn = document.getElementById('satisfiedBtn');
const notSatisfiedBtn = document.getElementById('notSatisfiedBtn');
const focusEnergyBtn = document.getElementById('focusEnergyBtn');
const elevateBtn = document.getElementById('elevateBtn');
const closeInspectBtn = document.getElementById('closeInspectBtn');
const showConnectionsBtn = document.getElementById('showConnectionsBtn');
const showHealthBtn = document.getElementById('showHealthBtn');
const healthPositiveBtn = document.getElementById('healthPositiveBtn');
const healthNegativeBtn = document.getElementById('healthNegativeBtn');

const COLORS = {
  defaultDome: 0x6fbaff,
  defaultGlow: 0x4da6ff,
  defaultRing: 0x4da6ff,
  defaultPulse: 0xffd700,
  satisfied: 0x16a34a,
  notSatisfied: 0xdc2626
};

let systemSelected = false;
let selectedSystem = null;
let connectionsMode = false;
let healthMode = false;
let healthOnlyPositive = false;
let healthOnlyNegative = false;
let elevatedMode = false;
let elevateBlend = 0.0;
let elevateTransitionActive = false;
let autoPanDelay = 0.0;
let descendCameraRadius = orbit.radius;
let formationRetargetActive = false;
let formationRetargetBlend = 1.0;
const formationRetargetStarts = new Map();

function resetElevation() {
  elevatedMode = false;
  elevateTransitionActive = true;
  autoPanDelay = 0.0;
  descendCameraRadius = orbit.radius;
  formationRetargetActive = false;
  formationRetargetBlend = 1.0;
  formationRetargetStarts.clear();
  elevateBtn.textContent = 'Ascend';
}

function lerpAngle(current, target, amt) {
  let delta = target - current;
  while (delta > Math.PI) delta -= Math.PI * 2.0;
  while (delta < -Math.PI) delta += Math.PI * 2.0;
  return current + delta * amt;
}

function syncElevateButton() {
  elevateBtn.textContent = elevatedMode ? 'Descend' : 'Ascend';
}

function enableConnectionsMode() {
  if (healthMode) {
    healthMode = false;
    showHealthBtn.classList.remove('active');
    showHealthBtn.textContent = 'Show Health';
  }
  connectionsMode = true;
  showConnectionsBtn.classList.add('active');
  showConnectionsBtn.textContent = 'Hide Energy';
  showHealthBtn.style.display = 'none';
  syncElevateButton();
}

function startFormationRetarget(newFocusSystem) {
  formationRetargetStarts.clear();
  clickableSystems.forEach(system => {
    formationRetargetStarts.set(system, {
      position: (system.currentPosition || system.g.position).clone(),
      anchor: (system.currentAnchor || system.earthAnchor || new THREE.Vector3()).clone(),
      outward: (system.currentOutward || system.surfaceNormal || new THREE.Vector3(0, 1, 0)).clone()
    });
  });
  focusedSystem = newFocusSystem;
  formationRetargetActive = true;
  formationRetargetBlend = 0.0;
}


function enterHealthPanelMode() {
  document.body.classList.add('health-panel-mode');
  inspectTitle.textContent = 'Health Filters';
  inspectSubtitle.textContent = 'Filter positive and negative responses.';
  updateHealthFilterButtons();
  inspectPanel.classList.add('visible');
}

function exitHealthPanelMode() {
  document.body.classList.remove('health-panel-mode');
}

function updateHealthFilterButtons() {
  healthPositiveBtn.classList.toggle('active', healthOnlyPositive);
  healthNegativeBtn.classList.toggle('active', healthOnlyNegative);
}

// UI Logic
showConnectionsBtn.addEventListener('click', () => {
  connectionsMode = !connectionsMode;
  if (!connectionsMode) resetElevation();
  showConnectionsBtn.classList.toggle('active', connectionsMode);
  showConnectionsBtn.textContent = connectionsMode ? 'Hide Energy' : 'Show Energy';
  showHealthBtn.style.display = connectionsMode ? 'none' : 'block';
  if (connectionsMode && typeof focusedSystem !== 'undefined' && focusedSystem) {
    openInspectPanel(focusedSystem);
  }
  syncElevateButton();
});

showHealthBtn.addEventListener('click', () => {
  healthMode = !healthMode;
  if (healthMode) {
    resetElevation();
    selectedSystem = null;
    systemSelected = false;
    enterHealthPanelMode();
  } else {
    closeInspectPanel();
  }
  showHealthBtn.classList.toggle('active', healthMode);
  showHealthBtn.textContent = healthMode ? 'Hide Health' : 'Show Health';
  showConnectionsBtn.style.display = healthMode ? 'none' : 'block';
  syncElevateButton();
});

// ===== STARS (Depth Colored) =====
const starsGeom = new THREE.BufferGeometry();
const starCount = 4000;
const starPositions = new Float32Array(starCount * 3);
const starColors = new Float32Array(starCount * 3);

const minRadius = 35;
const maxRadius = 85;

for (let i = 0; i < starCount; i++) {
  const radius = minRadius + Math.random() * (maxRadius - minRadius);
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  
  starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = radius * Math.cos(phi);
  starPositions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);

  const depthStr = 1.0 - ((radius - minRadius) / (maxRadius - minRadius));
  const intensity = 0.15 + 0.85 * Math.pow(depthStr, 2.5);

  starColors[i * 3] = 0.85 * intensity + 0.15 * depthStr;
  starColors[i * 3 + 1] = 0.90 * intensity + 0.10 * depthStr;
  starColors[i * 3 + 2] = 1.00 * intensity;
}
starsGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starsGeom.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

const stars = new THREE.Points(
  starsGeom,
  new THREE.PointsMaterial({
    size: 0.22,
    vertexColors: true,
    transparent: true,
    opacity: 1.0,
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  })
);
scene.add(stars);

// ===== MILKY WAY =====
const milkyWayGroup = new THREE.Group();

const mwSphereGeo = new THREE.SphereGeometry(300, 64, 64);
const mwSphereMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vPos;
    float hash(vec3 p) {
      p = fract(p * 0.3183099 + .1); p *= 17.0;
      return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
    }
    float noise(vec3 x) {
      vec3 i = floor(x); vec3 f = fract(x); f = f * f * (3.0 - 2.0 * f);
      return mix(mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
                 mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
    }
    float fbm(vec3 p) {
      float f = 0.0; float amp = 0.5;
      for(int i=0; i<4; i++){ f += amp * noise(p); p *= 2.0; amp *= 0.5; }
      return f;
    }
    void main() {
      vec3 nPos = normalize(vPos);
      float lat = asin(nPos.y); float lon = atan(nPos.z, nPos.x);
      float isCore = exp(-pow(lon, 2.0) * 0.5); 
      float thickness = 4.0 - 1.5 * isCore;
      float band = exp(-pow(abs(lat) * thickness, 2.0));
      float n = fbm(nPos * 15.0);
      float dust = fbm(nPos * 30.0 + vec3(10.0));
      float rift = smoothstep(0.3, 0.7, dust);
      band *= (0.4 + 0.6 * n) * (1.0 - rift * 0.5 * exp(-abs(lat)*10.0));
      vec3 coreColor = vec3(1.0, 0.8, 0.6); vec3 edgeColor = vec3(0.08, 0.15, 0.35);
      vec3 color = mix(edgeColor, coreColor, isCore * band);
      gl_FragColor = vec4(color * band * 0.9, band * 0.6);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide
});
milkyWayGroup.add(new THREE.Mesh(mwSphereGeo, mwSphereMat));

const mwPointsGeo = new THREE.BufferGeometry();
const mwPointCount = 40000;
const mwPos = new Float32Array(mwPointCount * 3);
const mwColors = new Float32Array(mwPointCount * 3);
const mwRadius = 250;

for (let i = 0; i < mwPointCount; i++) {
  let l = Math.random() * Math.PI * 2;
  if (Math.random() > 0.6) l = (Math.random() - 0.5) * 1.5; 
  const isCore = Math.exp(-Math.pow(l, 2.0) * 0.5);
  const spread = 0.12 + 0.1 * isCore;
  const b = (Math.random() + Math.random() + Math.random() - 1.5) * spread;

  mwPos[i*3] = mwRadius * Math.cos(b) * Math.cos(l);
  mwPos[i*3+1] = mwRadius * Math.sin(b);
  mwPos[i*3+2] = mwRadius * Math.cos(b) * Math.sin(l);

  const intensity = 0.3 + Math.random() * 0.7;
  if (isCore > 0.5 && Math.random() > 0.3) {
    mwColors[i*3] = 1.0 * intensity; mwColors[i*3+1] = 0.85 * intensity; mwColors[i*3+2] = 0.7 * intensity;
  } else {
    mwColors[i*3] = 0.6 * intensity; mwColors[i*3+1] = 0.8 * intensity; mwColors[i*3+2] = 1.0 * intensity;
  }
}
mwPointsGeo.setAttribute('position', new THREE.BufferAttribute(mwPos, 3));
mwPointsGeo.setAttribute('color', new THREE.BufferAttribute(mwColors, 3));

const mwPointsMat = new THREE.PointsMaterial({
  size: 0.25, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false
});
milkyWayGroup.add(new THREE.Points(mwPointsGeo, mwPointsMat));

const raNGP = 192.8595 * Math.PI / 180; const decNGP = 27.1283 * Math.PI / 180;
const yAxisVec = new THREE.Vector3(Math.cos(decNGP) * Math.cos(raNGP), Math.sin(decNGP), Math.cos(decNGP) * Math.sin(raNGP)).normalize();
const raGC = 266.4051 * Math.PI / 180; const decGC = -28.9362 * Math.PI / 180;
const xAxisVec = new THREE.Vector3(Math.cos(decGC) * Math.cos(raGC), Math.sin(decGC), Math.cos(decGC) * Math.sin(raGC)).normalize();
const zAxisVec = new THREE.Vector3().crossVectors(xAxisVec, yAxisVec).normalize();
xAxisVec.crossVectors(yAxisVec, zAxisVec).normalize();
const basisMat = new THREE.Matrix4().makeBasis(xAxisVec, yAxisVec, zAxisVec);
milkyWayGroup.applyMatrix4(basisMat);

scene.add(milkyWayGroup);

// ===== LIGHTING & SUN =====
const sun = new THREE.DirectionalLight(0xffffff, 1.35); 
sun.position.set(8, 2.5, 0);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.18));

const sunGroup = new THREE.Group();
const sunCore = new THREE.Mesh(new THREE.SphereGeometry(0.115, 40, 40), new THREE.MeshBasicMaterial({ color: 0xfff8de }));
sunGroup.add(sunCore);

const size = 256;
const canvasGlow = document.createElement('canvas');
canvasGlow.width = size; canvasGlow.height = size;
const ctx = canvasGlow.getContext('2d');
const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
gradient.addColorStop(0, 'rgba(255,255,235,1)');
gradient.addColorStop(0.16, 'rgba(255,245,200,0.95)');
gradient.addColorStop(0.34, 'rgba(255,228,120,0.60)');
gradient.addColorStop(0.62, 'rgba(255,216,90,0.18)');
gradient.addColorStop(1, 'rgba(255,210,70,0)');
ctx.fillStyle = gradient; ctx.fillRect(0,0,size,size);

const glowTexture = new THREE.CanvasTexture(canvasGlow);
const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
sunGlow.scale.set(1.28, 1.28, 1);
sunGroup.add(sunGlow);

function makeRay(length, thickness, color, opacity){
  return new THREE.Mesh(
    new THREE.PlaneGeometry(length, thickness),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity, blending: THREE.AdditiveBlending, depthWrite: false })
  );
}

const raysGroup = new THREE.Group();
const rayAngles = [0, Math.PI/5, -Math.PI/5, Math.PI*2/5, -Math.PI*2/5];
rayAngles.forEach((angle, i) => {
  const ray = makeRay(i === 0 ? 0.48 : 0.34, i === 0 ? 0.010 : 0.007, 0xffffff, i === 0 ? 0.95 : 0.8);
  ray.rotation.z = angle; raysGroup.add(ray);
});
sunGroup.add(raysGroup);
sunGroup.position.copy(sun.position.clone().normalize().multiplyScalar(9.5));
scene.add(sunGroup);

// ===== MOON =====
const moonOrbitGroup = new THREE.Group();
scene.add(moonOrbitGroup);
let moon = null;
const moonDistance = 1.72;

function getCurrentMoonAngle() {
  const now = new Date();
  const synodicMonthDays = 29.530588853;
  const referenceNewMoon = Date.UTC(2000, 0, 6, 18, 14, 0);
  const phase = (((now.getTime() - referenceNewMoon) / 86400000) % synodicMonthDays + synodicMonthDays) % synodicMonthDays / synodicMonthDays;
  return phase * Math.PI * 2;
}
const moonAngle = getCurrentMoonAngle();

function orientMoonTowardEarth(moonMesh) {
  if (!moonMesh) return;
  moonMesh.lookAt(0, 0, 0);
  moonMesh.rotateY(Math.PI);
}

const loader = new THREE.TextureLoader();
const moonTexture = loader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg');
moon = new THREE.Mesh(new THREE.SphereGeometry(0.072, 48, 48), new THREE.MeshPhongMaterial({ map: moonTexture, shininess: 2 }));
moonOrbitGroup.add(moon);
moon.position.set(Math.cos(moonAngle) * moonDistance, 0.10 * Math.sin(moonAngle * 0.7), Math.sin(moonAngle) * moonDistance);
orientMoonTowardEarth(moon);

// ===== EARTH =====
const dayMap = loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
const nightMap = loader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg');
const normalMap = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
const specMap = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

const earthGroup = new THREE.Group();
scene.add(earthGroup);

const earthMaterial = new THREE.MeshPhongMaterial({
  map: dayMap, 
  normalMap: normalMap, 
  normalScale: new THREE.Vector2(0.85, 0.85), 
  specularMap: specMap,
  shininess: 12, 
  specular: new THREE.Color(0x111111), 
  color: new THREE.Color(0xffffff), 
  emissive: new THREE.Color(0x000000)
});
const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), earthMaterial);
earthGroup.add(earth);

// ===== GLOBE.GL TRUE DAY/NIGHT CROSSFADE =====
const nightMaterial = new THREE.ShaderMaterial({
  uniforms: { 
    nightMap: { value: nightMap }, 
    lightDir: { value: new THREE.Vector3(1, 0, 0) },
    uMode: { value: 0.0 }
  },
  vertexShader: `
    varying vec2 vUv; varying vec3 vNormalW;
    void main() { 
      vUv = uv; 
      vNormalW = normalize(mat3(modelMatrix) * normal); 
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); 
    }
  `,
  fragmentShader: `
    uniform sampler2D nightMap; 
    uniform vec3 lightDir; 
    uniform float uMode;
    varying vec2 vUv; 
    varying vec3 vNormalW;
    
    void main() {
      float lDot = dot(normalize(vNormalW), normalize(lightDir));
      float nightAlpha = smoothstep(0.2, -0.2, lDot);
      float alpha = mix(nightAlpha, 1.0, uMode);
      vec3 nightColor = texture2D(nightMap, vUv).rgb;
      gl_FragColor = vec4(nightColor, alpha);
    }
  `,
  transparent: true, 
  blending: THREE.NormalBlending, 
  depthWrite: false
});
const nightSphere = new THREE.Mesh(new THREE.SphereGeometry(1.0015, 128, 128), nightMaterial);
earthGroup.add(nightSphere);


// ===== HEALTH POPULATION PILLARS (STACKED RED/GREEN) =====
let healthPillarsGroup = new THREE.Group();
healthPillarsGroup.visible = false;
healthPillarsGroup.renderOrder = 10;
earthGroup.add(healthPillarsGroup);

const healthPillarMaterials = {
  red: new THREE.MeshBasicMaterial({ color: 0xdc2626, transparent: true, opacity: 0.96 }),
  green: new THREE.MeshBasicMaterial({ color: 0x16a34a, transparent: true, opacity: 0.96 })
};

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function clusteredGreenShare(lat, lng) {
  const a = 0.5 + 0.5 * Math.sin((lat + 18.0) * 0.11);
  const b = 0.5 + 0.5 * Math.cos((lng - 22.0) * 0.08);
  const c = 0.5 + 0.5 * Math.sin((lat + lng) * 0.045);
  const d = 0.5 + 0.5 * Math.cos((lat - lng) * 0.035);
  const raw = a * 0.34 + b * 0.28 + c * 0.22 + d * 0.16;
  return Math.pow(clamp01(raw), 1.65);
}

function rebuildHealthPillars(data) {
  while (healthPillarsGroup.children.length) {
    const child = healthPillarsGroup.children.pop();
    if (child.geometry) child.geometry.dispose();
  }

  if (!data.length) return;

  const maxPop = Math.max(...data.map(d => d.pop));
  const totalPop = data.reduce((sum, d) => sum + d.pop, 0);

  const rawShares = data.map(d => clusteredGreenShare(d.lat, d.lng));
  const rawWeightedAvg = rawShares.reduce((sum, share, idx) => sum + share * data[idx].pop, 0) / totalPop;
  const shareScale = rawWeightedAvg > 0 ? 0.20 / rawWeightedAvg : 1.0;

  data.forEach((d, idx) => {
    const popNorm = Math.sqrt(d.pop / maxPop);
    const totalHeight = 0.01 + popNorm * 0.24;
    const radius = 0.0025 + popNorm * 0.0095;

    const greenShare = clamp01(rawShares[idx] * shareScale);
    const greenHeight = totalHeight * greenShare;
    const redHeight = totalHeight - greenHeight;

    const base = latLonToVec(d.lat, d.lng, 1.0015);
    const normal = base.clone().normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);

    if (greenHeight > 0.0005) {
      const greenGeom = new THREE.CylinderGeometry(radius, radius, greenHeight, 10, 1, false);
      const greenMesh = new THREE.Mesh(greenGeom, healthPillarMaterials.green);
      greenMesh.userData.segmentType = 'positive';
      greenMesh.quaternion.copy(quat);
      greenMesh.position.copy(base.clone().add(normal.clone().multiplyScalar(greenHeight * 0.5)));
      healthPillarsGroup.add(greenMesh);
    }

    if (redHeight > 0.0005) {
      const redGeom = new THREE.CylinderGeometry(radius, radius, redHeight, 10, 1, false);
      const redMesh = new THREE.Mesh(redGeom, healthPillarMaterials.red);
      redMesh.userData.segmentType = 'negative';

      redMesh.position.copy(base.clone().add(normal.clone().multiplyScalar(greenHeight + redHeight * 0.5)));
      healthPillarsGroup.add(redMesh);
    }
  });
}

    varying vec3 vPos; varying vec3 vNormalWorld;

  fragmentShader: `
    uniform float time; uniform vec3 lightDir; uniform float uMode; varying vec3 vPos; varying vec3 vNormalWorld;
    float hash(vec3 p) { p = fract(p * 0.3183099 + .1); p *= 17.0; return fract(p.x * p.y * p.z * (p.x + p.y + p.z)); }
    float noise(vec3 x) {
      vec3 i = floor(x); vec3 f = fract(x); f = f * f * (3.0 - 2.0 * f);
      return mix(mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),

    }
    float fbm(vec3 p) { float f = 0.0; float amp = 0.5; for(int i=0; i<4; i++){ f += amp * noise(p); p *= 2.0; amp *= 0.5; } return f; }
    void main() {
      vec3 nPos = normalize(vPos); float lat = abs(nPos.y);

      float cur = smoothstep(0.4, 0.75, n1 * n2 + n2 * 0.45);

  `,

// ===== SYNCHRONIZED, BI-DIRECTIONAL ENERGY ARCS =====
let globalMaxArcLength = 0;

const arcShaderSource = {
  uniforms: {
    time: { value: 0 },
    colorGoa: { value: new THREE.Color(0xffd700) }, // Gold
    colorSys: { value: new THREE.Color(0xffd700) }, // Gold
    isCore: { value: 1.0 },
    arcLength: { value: 1.0 }, 
    maxArcLength: { value: 1.0 } 
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float time;
    uniform vec3 colorGoa;
    uniform vec3 colorSys;
    uniform float isCore;
    uniform float arcLength;
    uniform float maxArcLength;
    varying vec2 vUv;

    void main() {
      float V = 0.15; 
      float D_leg = maxArcLength + 0.5; 
      float D_cycle = D_leg * 2.0; 
      float d_total = time * V;
      float d_mod = mod(d_total, D_cycle);
      float isRev = step(D_leg, d_mod);
      float head_pos = d_mod - isRev * D_leg;
      float x_fwd = (1.0 - vUv.x) * arcLength; 
      float x_rev = vUv.x * arcLength;         
      float x_pixel = mix(x_fwd, x_rev, isRev);
      float dBehind = head_pos - x_pixel;
      float validMask = step(0.0, dBehind);
      float L_tail = 0.45;
      float L_head = 0.035;
      float trail = smoothstep(L_tail, 0.0, dBehind) * validMask;
      float head = smoothstep(L_head, 0.0, dBehind) * validMask;
      float baseAlpha = isCore > 0.5 ? 0.25 : 0.06;
      float pulseAlpha = trail * 0.6 + head * 1.0;
      if (isCore < 0.5) pulseAlpha *= 0.5;

      vec3 travelColor = mix(colorSys, colorGoa, isRev);
      vec3 previousColor = mix(colorGoa, colorSys, isRev);
      vec3 baseColor = mix(previousColor, travelColor, validMask);

      vec3 goldColor = vec3(1.0, 0.843, 0.0);
      float baseIsGold = 1.0 - smoothstep(0.05, 0.25, distance(baseColor, goldColor));
      float baseBoost = 1.0 + (1.0 - baseIsGold) * 0.5;
      baseColor = min(baseColor * baseBoost, vec3(1.0));

      vec3 finalColor = baseColor + (travelColor * pulseAlpha * 2.0);
      float outAlpha = (baseAlpha + pulseAlpha) * smoothstep(0.0, 0.05, vUv.x) * smoothstep(1.0, 0.95, vUv.x);
      gl_FragColor = vec4(finalColor, outAlpha);
    }
  `
};

function createArcLine() {
  const placeholderCurve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0.2, 0), new THREE.Vector3(0.2, 0, 0)
  );

  const matCore = new THREE.ShaderMaterial({
    uniforms: THREE.UniformsUtils.clone(arcShaderSource.uniforms),
    vertexShader: arcShaderSource.vertexShader,
    fragmentShader: arcShaderSource.fragmentShader,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
  });
  matCore.uniforms.isCore.value = 1.0;

  const matGlow = new THREE.ShaderMaterial({
    uniforms: THREE.UniformsUtils.clone(arcShaderSource.uniforms),

  });

  const tubeCore = new THREE.Mesh(new THREE.TubeGeometry(placeholderCurve, 64, 0.0015, 8, false), matCore);
  const tubeGlow = new THREE.Mesh(new THREE.TubeGeometry(placeholderCurve, 64, 0.0045, 8, false), matGlow);
  
  tubeCore.visible = false;

}


function updateArcPositions(startVec, endVec, arcObj) {
  const startLen = startVec.length();
  const endLen = endVec.length();
  const avgLen = (startLen + endLen) * 0.5;
  const styleBlendRaw = THREE.MathUtils.clamp((avgLen - 1.03) / 0.10, 0, 1);
  const styleBlend = styleBlendRaw * styleBlendRaw * (3.0 - 2.0 * styleBlendRaw);

  const globeStart = startVec.clone().normalize().multiplyScalar(1.03);
  const globeEnd = endVec.clone().normalize().multiplyScalar(1.03);
  const globeMid = globeStart.clone().add(globeEnd).multiplyScalar(0.5).normalize();
  const globeDistance = globeStart.distanceTo(globeEnd);
  const globeLift = Math.min(1.4, 0.35 + globeDistance * 0.6);
  const globeControl = globeMid.multiplyScalar(1.0 + globeLift);

  const spaceStart = startVec.clone();
  const spaceEnd = endVec.clone();
  const spaceMid = spaceStart.clone().add(spaceEnd).multiplyScalar(0.5);
  const spaceDistance = spaceStart.distanceTo(spaceEnd);
  const spaceMidRadius = spaceMid.length();
  const spaceLift = Math.min(0.55, 0.12 + spaceDistance * 0.22);
  const spaceControl = spaceMid.clone().normalize().multiplyScalar(spaceMidRadius + spaceLift);

  const start = globeStart.clone().lerp(spaceStart, styleBlend);
  const end = globeEnd.clone().lerp(spaceEnd, styleBlend);
  const control = globeControl.clone().lerp(spaceControl, styleBlend);

  const curve = new THREE.QuadraticBezierCurve3(start, control, end);
  const trueArcLength = curve.getLength();
  
  if (trueArcLength > globalMaxArcLength) {
      globalMaxArcLength = trueArcLength;
  }

  arcObj.tubeCore.material.uniforms.arcLength.value = trueArcLength;
  arcObj.tubeGlow.material.uniforms.arcLength.value = trueArcLength;
  arcObj.tubeCore.material.uniforms.maxArcLength.value = globalMaxArcLength;
  arcObj.tubeGlow.material.uniforms.maxArcLength.value = globalMaxArcLength;

  if (arcObj.tubeCore.geometry) arcObj.tubeCore.geometry.dispose();
  if (arcObj.tubeGlow.geometry) arcObj.tubeGlow.geometry.dispose();
  
  arcObj.tubeCore.geometry = new THREE.TubeGeometry(curve, 64, 0.0015, 8, false);
  arcObj.tubeGlow.geometry = new THREE.TubeGeometry(curve, 64, 0.0045, 8, false);
}

function latLonToVec(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta)
  );
}

function quadraticBezierVec3(p0, p1, p2, t) {
  const omt = 1.0 - t;
  return p0.clone().multiplyScalar(omt * omt)
    .add(p1.clone().multiplyScalar(2.0 * omt * t))
    .add(p2.clone().multiplyScalar(t * t));
}

function smoothstep01(x) {
  const t = Math.max(0.0, Math.min(1.0, x));
  return t * t * (3.0 - 2.0 * t);
}

function computeStagedOrbitPosition(earthPos, surfaceNormal, targetPos, blend) {
  const stageSplit = 0.5;
  const orbitLift = 0.28;
  const launchPoint = earthPos.clone().add(surfaceNormal.clone().multiplyScalar(orbitLift));

  if (blend <= stageSplit) {
    const t = smoothstep01(blend / stageSplit);
    return earthPos.clone().lerp(launchPoint, t);
  }

  const t = smoothstep01((blend - stageSplit) / (1.0 - stageSplit));
  const spaceMid = launchPoint.clone().add(targetPos).multiplyScalar(0.5);
  const midNormal = spaceMid.clone().normalize();
  const control = midNormal.multiplyScalar(Math.max(launchPoint.length(), targetPos.length()) + 0.18)
    .add(new THREE.Vector3(0, 0.06, 0));
  return quadraticBezierVec3(launchPoint, control, targetPos, t);
}

function getLocalBasis(normal) {
  const reference = Math.abs(normal.y) < 0.95
    ? new THREE.Vector3(0, 1, 0)
    : new THREE.Vector3(1, 0, 0);
  const tangentA = new THREE.Vector3().crossVectors(reference, normal).normalize();
  const tangentB = new THREE.Vector3().crossVectors(normal, tangentA).normalize();
  return { tangentA, tangentB };
}

function getElevatedLayoutTargets(focusSystem) {
  const center = new THREE.Vector3(0, 1.09, 0);
  const ringAxisA = new THREE.Vector3(1, 0, 0);
  const ringAxisB = new THREE.Vector3(0, 0, 1);
  const others = clickableSystems.filter(system => system !== focusSystem);
  const ringRadius = 0.42;
  const focusLift = new THREE.Vector3(0, 0.04, 0);
  const targets = new Map();

  targets.set(focusSystem, {
    position: center.clone().add(focusLift),
    anchor: center.clone().add(focusLift),
    outward: new THREE.Vector3(0, 1, 0)
  });

  others.forEach((system, idx) => {
    const angle = (idx / Math.max(1, others.length)) * Math.PI * 2 - Math.PI / 2;
    const circularOffset = ringAxisA.clone().multiplyScalar(Math.cos(angle) * ringRadius)
      .add(ringAxisB.clone().multiplyScalar(Math.sin(angle) * ringRadius));
    const elevatedPos = center.clone().add(circularOffset);
    const outward = elevatedPos.clone().sub(center).normalize().lerp(new THREE.Vector3(0, 1, 0), 0.35).normalize();
    targets.set(system, {
      position: elevatedPos,
      anchor: elevatedPos.clone(),
      outward
    });
  });

  return targets;
}

  nightMaterial.uniforms.uMode.value += (targetMode - nightMaterial.uniforms.uMode.value) * 0.1;
  auroraMaterial.uniforms.uMode.value = nightMaterial.uniforms.uMode.value;

  healthPillarsGroup.visible = healthMode;
  if (healthMode) {
    for (const child of healthPillarsGroup.children) {
      if (healthOnlyPositive) {
        child.visible = child.userData.segmentType === 'positive';
      } else if (healthOnlyNegative) {
        child.visible = child.userData.segmentType === 'negative';
      } else {
        child.visible = true;
      }
    }
  }

  const elevateBlendRate = elevatedMode ? 0.01 : 0.005;
  elevateBlend += ((elevatedMode ? 1.0 : 0.0) - elevateBlend) * elevateBlendRate;
  const easedElevateBlend = elevateBlend * elevateBlend * (3.0 - 2.0 * elevateBlend);

  if (elevateTransitionActive && elevatedMode) {
    autoPanDelay = Math.min(1.0, autoPanDelay + 0.01);
    const delayedPanBlend = Math.max(0.0, Math.min(1.0, (autoPanDelay - 0.16) / 0.58));
    const easedPanBlend = delayedPanBlend * delayedPanBlend * (3.0 - 2.0 * delayedPanBlend);
    const targetPhi = 1.25;
    orbit.phi += (targetPhi - orbit.phi) * (0.006 * easedPanBlend);
    updateCamera();
    if (elevateBlend > 0.985) {
      elevateTransitionActive = false;
    }
  }

  clickableSystems.forEach(system => {
    const surface = system === primarySystem
      ? base.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), earthGroup.rotation.y)
      : system.base.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), earthGroup.rotation.y);
    const outward = surface.clone().normalize();
    const pos = surface.clone().add(outward.clone().multiplyScalar(domeHeight));
    const anchor = outward.clone().multiplyScalar(1.03);

    system.surfacePosition = surface;
    system.surfaceNormal = outward;
    system.earthPosition = pos;
    system.earthAnchor = anchor;
  });

  const elevatedTargets = getElevatedLayoutTargets(focusedSystem);

  if (formationRetargetActive) {
    formationRetargetBlend = Math.min(1.0, formationRetargetBlend + 0.0175);
    if (formationRetargetBlend >= 0.999) {
      formationRetargetActive = false;
      formationRetargetBlend = 1.0;
      formationRetargetStarts.clear();
    }
  }

  clickableSystems.forEach(system => {
    const target = elevatedTargets.get(system);
    let currentPos;
    let currentAnchor;
    let currentOutward;

    if (elevatedMode && formationRetargetActive && formationRetargetStarts.has(system)) {
      const retargetEase = formationRetargetBlend * formationRetargetBlend * (3.0 - 2.0 * formationRetargetBlend);
      const start = formationRetargetStarts.get(system);
      currentPos = start.position.clone().lerp(target.position, retargetEase);
      currentAnchor = start.anchor.clone().lerp(target.anchor, retargetEase);
      currentOutward = start.outward.clone().lerp(target.outward, retargetEase).normalize();
    } else {
      currentPos = computeStagedOrbitPosition(system.earthPosition, system.surfaceNormal, target.position, easedElevateBlend);
      currentAnchor = computeStagedOrbitPosition(system.earthAnchor, system.surfaceNormal, target.anchor, easedElevateBlend);
      currentOutward = system.surfaceNormal.clone().lerp(target.outward, easedElevateBlend).normalize();
    }

    system.g.position.copy(currentPos);
    system.g.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), currentOutward);
    applySystemColors(system);
    system.dome.scale.setScalar(1 + Math.sin(t) * 0.02);
    system.glow.scale.setScalar(1 + Math.sin(t) * 0.02);
    system.currentPosition = currentPos;
    system.currentAnchor = currentAnchor;
    system.currentOutward = currentOutward;
    system.g.visible = !healthMode;
  });


  if (elevateTransitionActive && !elevatedMode) {
    const focusViewDir = focusedSystem.earthPosition.clone().normalize();
    const targetPhi = Math.max(-1.25, Math.min(1.25, Math.asin(focusViewDir.y)));
    const targetTheta = Math.atan2(focusViewDir.x, focusViewDir.z);
    orbit.radius += (descendCameraRadius - orbit.radius) * 0.04;
    orbit.phi += (targetPhi - orbit.phi) * 0.015;
    orbit.theta = lerpAngle(orbit.theta, targetTheta, 0.015);
    updateCamera();
    if (elevateBlend < 0.05) {
      elevateTransitionActive = false;
    }
  }

  const others = clickableSystems.filter(system => system !== focusedSystem);
  const focusColors = getSystemColors(focusedSystem.state);

  connectionPool.forEach((arc, idx) => {
    const targetSystem = others[idx];
    const showArc = isConn && !!targetSystem;
    arc.tubeCore.visible = showArc;
    arc.tubeGlow.visible = showArc;

    if (!targetSystem) return;

    updateArcPositions(focusedSystem.currentAnchor, targetSystem.currentAnchor, arc);

    const targetColors = getSystemColors(targetSystem.state);
    arc.tubeCore.material.uniforms.colorGoa.value.setHex(focusColors.pulse);
    arc.tubeGlow.material.uniforms.colorGoa.value.setHex(focusColors.pulse);
    arc.tubeCore.material.uniforms.colorSys.value.setHex(targetColors.pulse);
    arc.tubeGlow.material.uniforms.colorSys.value.setHex(targetColors.pulse);

    if (showArc) {
      arc.tubeCore.material.uniforms.time.value = t;
      arc.tubeGlow.material.uniforms.time.value = t;
    }
  });

  t += 0.04;

  const sunPulse = 1 + Math.sin(t * 0.55) * 0.035;
  sunGlow.scale.set(1.28 * sunPulse, 1.28 * sunPulse, 1);
  raysGroup.rotation.z += 0.0008;

  if (moon) orientMoonTowardEarth(moon);

  renderer.render(scene, camera);
}
animate();
</script>
