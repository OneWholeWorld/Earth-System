<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Health Energy - Modular</title>
<link rel="icon" href="data:,">
<link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
<style>
html,body{margin:0;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
canvas{display:block}
#c{position:fixed;inset:0;z-index:2;cursor:grab;transition:opacity .6s ease}
#c:active{cursor:grabbing}
#map-container{position:fixed;inset:0;z-index:1;opacity:0;pointer-events:none;transition:opacity .6s ease;background:#000}
body.micro-view #c{opacity:0;pointer-events:none}
body.micro-view #map-container{opacity:1;pointer-events:auto}
body.micro-view #ui-container{opacity:0;pointer-events:none}
#ui-container{position:fixed;bottom:24px;left:24px;z-index:60;transition:opacity .5s ease}
.dropdown{position:relative;display:inline-block}
#target-btn{background:rgba(8,12,24,.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:12px 20px;color:#eef4ff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.4);transition:background .2s ease;display:flex;align-items:center;gap:8px;min-width:128px;justify-content:space-between}
#target-btn:hover{background:rgba(255,255,255,.1)}
.dropdown-content{display:none;position:absolute;bottom:100%;left:0;margin-bottom:12px;background:rgba(8,12,24,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.15);border-radius:12px;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,.6);overflow:hidden;flex-direction:column}
.dropdown-content.show{display:flex}
.dropdown-item{padding:14px 20px;color:#eef4ff;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s ease;display:flex;align-items:center;gap:10px}
.dropdown-item:hover{background:rgba(255,255,255,.1)}
.dropdown-item.active{color:#ffd700;background:rgba(255,215,0,.15)}
.gray-moon{filter:grayscale(100%) brightness(1.2);display:inline-block}
#app-hud{position:fixed;top:16px;left:16px;z-index:70;display:flex;flex-direction:column;gap:8px;width:150px}
#app-hud button{border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:10px 12px;color:#eef4ff;background:rgba(8,12,24,.72);backdrop-filter:blur(12px);font:700 12px/1.2 Inter,system-ui,sans-serif;cursor:pointer;box-shadow:0 12px 34px rgba(0,0,0,.25)}
#app-hud button:hover{background:rgba(255,255,255,.13)}
#app-hud button.active[data-layer="energy"]{background:rgba(212,175,55,.88);color:#111827}
#app-hud button.active[data-layer="health"]{background:rgba(220,38,38,.86);color:#fff}
#status-chip{position:fixed;right:16px;top:16px;z-index:70;padding:9px 11px;border-radius:999px;background:rgba(8,12,24,.68);border:1px solid rgba(255,255,255,.12);color:#bcd0f5;font:11px/1 Inter,system-ui,sans-serif;backdrop-filter:blur(12px)}
body.micro-view #app-hud{opacity:.18;pointer-events:none}
#inspectPanel{position:fixed;top:16px;right:16px;width:280px;z-index:72;padding:14px 16px;border-radius:16px;background:rgba(8,12,24,.72);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);color:#eef4ff;font:13px/1.4 Inter,system-ui,sans-serif;display:none}
#inspectPanel.visible{display:block}
#inspectPanel h3{margin:0 28px 6px 0;font-size:16px}
#inspectPanel p{margin:0 0 12px 0;color:#bcd0f5;font-size:12px}
#closeInspectBtn{position:absolute;top:10px;right:10px;width:28px;height:28px;border:none;border-radius:999px;background:rgba(255,255,255,.12);color:#eef4ff;cursor:pointer;font:600 16px/1 Inter,system-ui,sans-serif}
#closeInspectBtn:hover{background:rgba(255,255,255,.2)}
.inspectBtns{display:flex;flex-direction:column;gap:8px}
.inspectBtns button{width:100%;border:none;border-radius:10px;padding:10px 12px;cursor:pointer;color:white;font-weight:600}
#satisfiedBtn{background:#16a34a}
#notSatisfiedBtn{background:#dc2626}
#focusEnergyBtn{background:rgba(212,175,55,.85);color:#111827}
#elevateBtn{background:rgba(99,102,241,.85)}
#healthPositiveBtn,#healthNegativeBtn{width:100%;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:600;background:rgba(255,255,255,.06)}
#healthPositiveBtn{color:#9df0b5;border:2px solid rgba(22,163,74,.9)}
#healthPositiveBtn.active{background:#16a34a;color:#ffffff;border-color:#16a34a}
#healthNegativeBtn{color:#ff9e9e;border:2px solid rgba(220,38,38,.9)}
#healthNegativeBtn.active{background:#dc2626;color:#ffffff;border-color:#dc2626}
#heightRangeControl{margin-top:10px;padding:12px;border-radius:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}
#heightRangeControl label{display:block;font-size:11px;color:#bcd0f5;margin-bottom:8px}
#heightSliderWrap{position:relative;height:28px}
#heightSliderTrack{position:absolute;left:0;right:0;top:13px;height:4px;border-radius:999px;background:rgba(255,255,255,.16);overflow:hidden}
#heightSliderFill{position:absolute;top:0;height:100%;border-radius:999px;background:linear-gradient(90deg, rgba(250,204,21,.95), rgba(255,255,255,.82))}
.heightRangeInput{position:absolute;left:0;top:4px;width:100%;margin:0;appearance:none;-webkit-appearance:none;background:transparent;pointer-events:none}
#heightRangeMin{z-index:3}
#heightRangeMax{z-index:2}
.heightRangeInput::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;pointer-events:auto;width:16px;height:16px;border-radius:50%;background:#facc15;border:2px solid rgba(8,12,24,.92);box-shadow:0 0 0 2px rgba(250,204,21,.25), 0 4px 12px rgba(0,0,0,.35);cursor:pointer}
.heightRangeInput::-moz-range-thumb{pointer-events:auto;width:16px;height:16px;border-radius:50%;background:#facc15;border:2px solid rgba(8,12,24,.92);box-shadow:0 0 0 2px rgba(250,204,21,.25), 0 4px 12px rgba(0,0,0,.35);cursor:pointer}
.heightRangeInput::-webkit-slider-runnable-track{background:transparent}
#heightRangeReadout{font-size:11px;color:#eef4ff;margin-top:8px}
#heightRangeCount{font-size:10px;color:#9fb3d9;margin-top:3px}
#pillarTooltip{position:fixed;pointer-events:auto;background:rgba(8,12,24,.92);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:14px 16px;color:#eef4ff;font:12px Inter,system-ui,sans-serif;display:none;z-index:80;min-width:220px;box-shadow:0 18px 44px rgba(0,0,0,.38);backdrop-filter:blur(12px)}
.pillarTooltipClose{position:absolute;top:7px;right:8px;width:22px;height:22px;border:none;border-radius:999px;background:rgba(255,255,255,.10);color:#eef4ff;cursor:pointer;font:700 14px/1 Inter,system-ui,sans-serif;pointer-events:auto}
.pillarTooltipClose:hover{background:rgba(255,255,255,.20)}
#healthClusterBtn{width:100%;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:600;background:rgba(255,255,255,.06);color:#facc15;border:2px solid rgba(250,204,21,.72)}
#healthClusterBtn.active{background:rgba(250,204,21,.88);color:#111827;border-color:#facc15}
#cityHoverFlag{position:fixed;display:none;z-index:79;padding:6px 8px;border-radius:999px;background:rgba(8,12,24,.82);border:1px solid rgba(255,255,255,.14);color:#eef4ff;font:11px Inter,system-ui,sans-serif;pointer-events:none;box-shadow:0 12px 28px rgba(0,0,0,.32)}
#openFiltersBtn{position:fixed;top:16px;right:16px;z-index:71;width:42px;height:42px;border:none;border-radius:999px;background:rgba(8,12,24,.72);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.14);color:#eef4ff;cursor:pointer;font:700 18px/1 Inter,system-ui,sans-serif;display:none;box-shadow:0 12px 34px rgba(0,0,0,.30)}
#openFiltersBtn:hover{background:rgba(255,255,255,.14)}
#openFiltersBtn.visible{display:block}
#flyPanel{position:fixed;bottom:20px;right:20px;width:260px;z-index:71;font:12px Inter,system-ui,sans-serif}
#flyInput{width:100%;box-sizing:border-box;padding:10px 40px 10px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.16);outline:none;background:rgba(8,12,24,.82);color:#eef4ff;backdrop-filter:blur(12px);box-shadow:0 12px 34px rgba(0,0,0,.30)}
#flyClearBtn{display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);width:28px;height:28px;border:0;border-radius:999px;background:rgba(255,255,255,.11);color:#dbe7ff;font-size:18px;line-height:26px;cursor:pointer;padding:0}
#flySuggestions{display:none;max-height:220px;overflow:auto;margin-top:7px;background:rgba(8,12,24,.90);border:1px solid rgba(255,255,255,.12);border-radius:14px;backdrop-filter:blur(14px);box-shadow:0 18px 44px rgba(0,0,0,.42)}
body.micro-view #flyPanel{z-index:72}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="map-container"></div>

<div id="ui-container">
  <div class="dropdown">
    <button id="target-btn">🌍 Earth ▾</button>
    <div id="dropdown-menu" class="dropdown-content">
      <div class="dropdown-item active" data-target="earth">🌍 Earth</div>
      <div class="dropdown-item" data-target="moon"><span class="gray-moon">🌕</span> Moon</div>
      <div class="dropdown-item" data-target="sun">☀️ Sun</div>
    </div>
  </div>
</div>

<div id="app-hud">
  <button id="showEnergyBtn" data-layer="energy">Show Energy</button>
  <button id="showHealthBtn" data-layer="health">Show Health</button>
</div>
<div id="status-chip">earth-core layered app</div>
<div id="inspectPanel">
  <button id="closeInspectBtn" aria-label="Close">×</button>
  <h3 id="inspectTitle">Inspect System</h3>
  <p id="inspectSubtitle">Set the system state.</p>
  <div class="inspectBtns">
    <button id="satisfiedBtn">Satisfied</button>
    <button id="notSatisfiedBtn">Not Satisfied</button>
    <button id="focusEnergyBtn">Focus Energy</button>
    <button id="elevateBtn">Ascend</button>
    <button id="healthPositiveBtn">Show Only Positive</button>
    <button id="healthNegativeBtn">Show Only Negative</button>
    <button id="healthClusterBtn">Cluster Cities</button>
    <div id="heightRangeControl">
      <label for="heightRangeMax">Column Height Range</label>
      <div id="heightSliderWrap">
        <div id="heightSliderTrack"><div id="heightSliderFill"></div></div>
        <input id="heightRangeMin" class="heightRangeInput" type="range" min="0" max="100" step="1" value="0">
        <input id="heightRangeMax" class="heightRangeInput" type="range" min="0" max="100" step="1" value="100">
      </div>
      <div id="heightRangeReadout">Showing all columns</div>
      <div id="heightRangeCount">All cities</div>
    </div>
  </div>
</div>
<button id="openFiltersBtn" title="Open filters" aria-label="Open filters">☰</button>
<div id="pillarTooltip"></div>
<div id="cityHoverFlag"></div>
<div id="flyPanel">
  <div style="position:relative">
    <input id="flyInput" placeholder="Fly me to a city..." autocomplete="off">
    <button id="flyClearBtn" aria-label="Clear city search" title="Clear city search">×</button>
  </div>
  <div id="flySuggestions"></div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script>
window.EARTH_CORE_ASSET_BASE = '../earth-core/assets/';
</script>
<script src="../earth-core/earth-core.js"></script>
<script src="./earth-health-energy-app.js"></script>
</body>
</html>
